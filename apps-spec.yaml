# ─────────────────────────────────────────────────────────────
# VOICE-ONLY CALL APPS  (low-level call channel operations)
# ─────────────────────────────────────────────────────────────

backgroundPlayback:
  available_in: [voice]
  visual: false
  description: |
    Starts playing an audio file in the background of the call (non-blocking).
    The call flow continues while the file plays. Use backgroundPlaybackStop to stop it.
    Optionally reduces the volume of the primary audio while the background audio is playing.
  args:
    name:
      type: string
      description: "Optional handle name to identify this playback (used with backgroundPlaybackStop)."
    file:
      required: true
      type: object
      description: "File to play. {id, name}"
      fields:
        id: {type: integer, description: "File storage ID."}
        name: {type: string, description: "File name (for display)."}
    volumeReduction:
      type: integer
      default: 0
      description: "Reduce primary audio volume by this amount (dB) while background plays."
  example:
    schema: |
      {"backgroundPlayback": {"name": "hold-music", "file": {"id": 123}, "volumeReduction": 10}}

backgroundPlaybackStop:
  available_in: [voice]
  visual: false
  description: "Stops a background audio playback started with backgroundPlayback."
  args:
    name:
      type: string
      description: "Handle name passed to backgroundPlayback. If omitted, stops all background playback."
  example:
    schema: |
      {"backgroundPlaybackStop": {"name": "hold-music"}}

sleep:
  available_in: [voice]
  visual: false
  description: |
    Pauses the call flow for a specified number of milliseconds (blocking).
    Voice-channel variant. For non-call flows use softSleep instead.
  args:
    type: integer
    description: "Duration in milliseconds to pause."
  example:
    schema: |
      {"sleep": 2000}

cancelQueue:
  available_in: [voice]
  visual: false
  description: |
    Cancels the current queue distribution attempt and stores the result in `cc_cancel`.
    Call this from within a waiting sub-flow to remove the call from queue and resume
    the main flow.
  args: {}
  example:
    schema: |
      {"cancelQueue": {}}

ccOutbound:
  available_in: [voice]
  visual: false
  description: |
    Triggers an outbound queue call for an agent — used in agent-side flows to dial
    a customer from an outbound queue campaign.
  args:
    name:
      type: string
      description: "Display name for the outbound call."
    number:
      required: true
      type: string
      description: "Phone number to dial."
    queueName:
      type: string
      description: "Queue name for reporting."
    cancelDistribute:
      type: boolean
      default: false
      description: "If true, cancel the current queue distribution before dialing."
    processing:
      type: object
      description: "Post-call processing options."
  example:
    schema: |
      {"ccOutbound": {"number": "${lead_number}", "queueName": "outbound-sales"}}

pickup:
  available_in: [voice]
  visual: false
  description: "Picks up a parked call by its park name and bridges it to the current call."
  args:
    name:
      required: true
      type: string
      description: "Park slot name used when the call was parked."
  example:
    schema: |
      {"pickup": {"name": "slot-42"}}

setAll:
  available_in: [voice]
  visual: false
  description: |
    Sets multiple channel variables at once, propagating them to all call legs
    (unlike `set` which scopes to the current leg). Use for variables that must
    be visible on both the A-leg and any bridged B-leg.
  args:
    type: object
    description: "Key-value map of variables to set on all call legs."
  example:
    schema: |
      {"setAll": {"contact_id": "${crm_id}", "priority": "high"}}

setNoLocal:
  available_in: [voice]
  visual: false
  description: |
    Sets channel variables without propagating them to the local/originating leg.
    Used to pass data to the remote/bridged leg only.
  args:
    type: object
    description: "Key-value map of variables to set on the remote leg only."
  example:
    schema: |
      {"setNoLocal": {"agent_note": "VIP customer"}}

setSounds:
  available_in: [voice]
  visual: false
  description: "Sets the TTS voice and language for the current call session."
  args:
    voice:
      required: true
      type: string
      description: "TTS voice name (provider-specific)."
    lang:
      required: true
      type: string
      description: "Language code (e.g. en-US, uk-UA)."
  example:
    schema: |
      {"setSounds": {"voice": "Joanna", "lang": "en-US"}}

setUser:
  available_in: [voice]
  visual: false
  description: "Associates the call with a specific Webitel user by ID (for reporting and routing)."
  args:
    id:
      required: true
      type: integer
      description: "Webitel user ID to assign to this call."
  example:
    schema: |
      {"setUser": {"id": 42}}

update:
  available_in: [voice]
  visual: false
  description: |
    Updates variables on an outbound call that is associated with a Webitel user.
    Variable names prefixed with `wbt_` are stored as-is; others are prefixed with `usr_`.
    Only valid when the call has an associated user (call.userId != 0).
  args:
    variables:
      type: object
      description: "Variables to update on the outbound call."
  example:
    schema: |
      {"update": {"variables": {"outcome": "sale", "wbt_priority": "1"}}}

amdML:
  available_in: [voice]
  visual: false
  description: |
    Machine-learning-based Answering Machine Detection. Classifies the call answer as
    human or machine using an ML model. Tags to check for classification results are
    passed as a list. Complements the rule-based `amd` app (not documented separately).
  args:
    tags:
      type: array
      description: "Classification tag names to evaluate. Results stored in call variables."
  example:
    schema: |
      {"amdML": {"tags": ["human", "machine", "fax"]}}



tag_field:
  description: |
    Any app object can carry a 'tag' field. Tags are used as jump targets by goto.
    Place it on the first app of the section you want to loop back to.
  example:
    schema: |
      {
        "tag": "ivr-main-menu",
        "playback": {
          "files": [{"type": "mp3", "id": "<MENU_FILE_ID>"}],
          "getDigits": {"setVar": "ivr_choice", "min": 1, "max": 1, "tries": 3, "timeout": 5000}
        }
      }

break_field:
  description: |
    'break: true' on any app stops schema execution after that step completes.
    Use it to terminate a branch without falling through to the next step.
  example:
    schema: |
      {"break": true, "hangup": "NORMAL_CLEARING"}

