version: 1
project:
  name: flow_manager
  purpose: Routing and execution engine for calls, chats, emails, webhooks, IM, and processing flows.
core_runtime:
  entrypoint: server.go
  composition_root: app/app.go
  dispatcher: app/listener.go
  flow_engine:
    parser: flow/flow.go
    executor: flow/handler.go
    apps_registry: flow/applications.go
    control_flow:
      - flow/if.go
      - flow/while.go
      - flow/switch.go
      - flow/goto.go
      - flow/break.go
channels:
  call:
    router: routes/call/router.go
    apps: routes/call/applications.go
  chat:
    router: routes/chat/router.go
    apps: routes/chat/applications.go
  email:
    router: routes/email/router.go
    apps: routes/email/applications.go
  grpc:
    router: routes/grpc/router.go
    apps: routes/grpc/applications.go
  processing:
    router: routes/processing/router.go
    apps: routes/processing/applications.go
  channel:
    router: routes/channel/router.go
  webhook:
    router: routes/webhook/hook.go
  im:
    router: routes/im/router.go
flow_execution_contract:
  steps:
    - Provider creates model.Connection.
    - FlowManager.Listen dispatches connection to domain router.
    - Router resolves routing/schema and builds flow.Flow.
    - flow.Route iterates ApplicationRequest nodes.
    - Application handler executes and can mutate scope variables.
    - Triggers may run after disconnect or flow end.
  key_types:
    - model.Connection
    - model.Router
    - flow.Flow
    - flow.ApplicationRequest
notes:
  - Prefer small refactors around one channel/router at a time.
  - Verify disconnected trigger behavior when changing lifecycle code.
