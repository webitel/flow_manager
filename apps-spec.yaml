  args:
    queue:
      required: true
      type: object
      description: Queue reference — {id, name}.
    set:
      required: true
      type: string
      description: Variable to store the numeric result.
    metric:
      type: string
      description: Metric name. E.g. "count", "sl".
    calls:
      type: string
