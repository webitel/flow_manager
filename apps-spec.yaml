      }}

# ─── Cases (new generation) ──────────────────────────────────

getCases:
  available_in: [voice, chat, form, service]
  visual: false
  description: >
    Queries the Webitel Cases service (SearchCasesRequest) and stores the
    resulting list as JSON into a session variable. Empty result sets are
    written as an empty string (not an error).
  args:
    token:
      required: true
      type: string
      description: "Webitel API token used to authorize the call."
    setVar:
      required: true
      type: string
      description: "Name of the session variable to store the result JSON array in."
    page:
      type: integer
      description: "Page number for pagination (1-based)."
    size:
      type: integer
      description: "Number of results per page."
    q:
      type: string
      description: "General query string. Applied to fields listed in 'qin' (or a default set if 'qin' is empty)."
    qin:
      type: string
      description: "Comma-separated list of fields that 'q' should match against (e.g. 'subject,description')."
    ids:
      type: array
      items: string
      description: "Specific case IDs to retrieve. Mutually useful with other filters."
    sort:
      type: string
      description: "Sorting criteria, e.g. 'created_at:desc' or 'priority:asc'."
    fields:
      type: array
      items: string
      description: "Projection — which fields to return per case (e.g. ['id','subject','status','priority','contact'])."
    filters:
      type: array
      items: string
      description: >
        Additional filter expressions as key=value strings (e.g.
        ['status=open', 'priority=high']). Syntax follows the Cases API filter
        DSL.
    contact_id:
      type: string
      description: "Return only cases linked to this contact ID."
  examples:
    open_cases_for_contact:
      description: "Find open cases for the caller's contact"
      schema: |
        {"getCases": {
          "token":      "${CASES_TOKEN}",
          "setVar":     "open_cases",
          "contact_id": "${contact_id}",
          "filters":    ["status=open"],
          "sort":       "created_at:desc",
          "size":       20,
          "fields":     ["id", "subject", "status", "priority", "created_at"]
        }}
    by_ids:
      description: "Fetch specific cases by their IDs"
      schema: |
        {"getCases": {
          "token":  "${CASES_TOKEN}",
          "setVar": "cases_json",
          "ids":    ["${case_id_1}", "${case_id_2}"],
          "fields": ["id", "subject", "status"]
        }}
    full_text_search:
      description: "Free-text search across subject and description"
      schema: |
        {"getCases": {
          "token":  "${CASES_TOKEN}",
          "setVar": "search_results",
          "q":      "billing",
          "qin":    "subject,description",
          "page":   1,
          "size":   10,
          "sort":   "updated_at:desc"
        }}
    high_priority_paginated:
      description: "Page through high-priority open cases"
      schema: |
        {"getCases": {
          "token":   "${CASES_TOKEN}",
          "setVar":  "priority_cases",
          "filters": ["status=open", "priority=high"],
          "sort":    "created_at:desc",
          "page":    2,
          "size":    25
        }}
    minimal:
      description: "Just get every case for a contact"
      schema: |
        {"getCases": {
          "token":      "${CASES_TOKEN}",
          "setVar":     "contact_cases",
          "contact_id": "${contact_id}"
        }}
    last_activity_for_caller:
      description: "One most-recent case for the caller"
      schema: |
        {"getCases": {
          "token":      "${CASES_TOKEN}",
          "setVar":     "last_case",
          "contact_id": "${contact_id}",
          "sort":       "updated_at:desc",
          "size":       1,
          "fields":     ["id", "subject", "status", "updated_at"]
        }}
  notes:
    - "'token' and 'setVar' are required."
    - "'setVar' receives the raw JSON of the search response; parse it downstream if you need structured access."
    - "No results is NOT an error — the variable is set to an empty string. Guard with a length/empty check before using."
    - "Low-level protobuf/internal fields (state, sizeCache, unknownFields) are injected by the runtime and must not be passed from flows."
    - "Filter/sort DSL follows the Cases API (SearchCasesRequest). Use 'filters' for structured equality filters and 'q' + 'qin' for free-text search."
    - "Field names in 'fields' mirror the Cases API schema — request only what you need to keep the response small."

locateCase:
  available_in: [voice, chat, form, service]
  visual: false
  args:
