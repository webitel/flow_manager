# ─────────────────────────────────────────────────────────────
# BRIDGE CALL PARAMETERS
# Set via {"set": {"<param>": "<value>"}} BEFORE the bridge app.
# These control B-leg dialing behavior and A-leg post-bridge behavior.
# ─────────────────────────────────────────────────────────────

bridge_parameters:
  # ── A-leg / flow control ──────────────────────────────────
  continue_on_fail:
    type: boolean
    scope: set_before_bridge
    description: |
      Controls what happens when the called party is unavailable (busy/no-answer/offline).
      true  — flow continues to next step after bridge (use this for fallback to queue).
      false — stop processing, call ends. Default: false.
    example: '{"set": {"continue_on_fail": "true"}}'

  hangup_after_bridge:
    type: boolean
    scope: set_before_bridge
    description: |
      Controls what happens to A-leg when B-leg hangs up.
      true  — A-leg ends when B-leg ends (routing stops).
      false — routing continues after B-leg completes. Default: false.
    example: '{"set": {"hangup_after_bridge": "true"}}'

  call_timeout:
    type: integer
    scope: set_before_bridge
    description: "How long (in seconds) the endpoint will ring before bridge fails. Default: 60."
    example: '{"set": {"call_timeout": "30"}}'

  # ── Ringback / early media ────────────────────────────────
  instant_ringback:
    type: boolean
    scope: set_before_bridge
    description: "Ringback will not wait for an indication from the remote side before sending ringback to the caller."
    example: '{"set": {"instant_ringback": "true"}}'

  ignore_early_media:
    type: string
    scope: set_before_bridge
    values: ["true", "ring_ready"]
    description: |
      true       — ignore early media (183 Session Progress) from the endpoint.
      ring_ready — same as true, but also sends SIP 180 Ringing to the inbound leg when first SIP 183 is received.
    example: '{"set": {"ignore_early_media": "true"}}'

  ignore_display_updates:
    type: boolean
    scope: set_before_bridge
    description: "Do not send UPDATE messages to the call leg (suppress display updates)."
    example: '{"set": {"ignore_display_updates": "true"}}'

  sip_renegotiate_codec_on_reinvite:
    type: boolean
    scope: set_before_bridge
    description: "Allow SDP codec change via re-INVITE during the call."
    example: '{"set": {"sip_renegotiate_codec_on_reinvite": "true"}}'

  # ── Caller ID ─────────────────────────────────────────────
  origination_caller_id_number:
    type: string
    scope: set_before_bridge_or_endpoint_parameters
    description: |
      Sets the outgoing Caller ID number shown to the called party.
      Can be set via {"set": {}} before bridge, OR inside endpoint.parameters for per-endpoint override.
    example: '{"set": {"origination_caller_id_number": "${effective_caller_id_number}"}}'

  # ── Per-endpoint parameters (inside endpoint.parameters{}) ──
  leg_timeout:
    type: integer
    scope: endpoint_parameters_only
    description: "Ringing timeout in seconds for this specific endpoint. Can ONLY be used inside endpoint.parameters, not as a global set."
    example: '"parameters": {"leg_timeout": "15"}'

  leg_delay_start:
    type: integer
    scope: endpoint_parameters_only
    description: "Delay in seconds before starting to ring this endpoint branch. Can ONLY be used inside endpoint.parameters."
    example: '"parameters": {"leg_delay_start": "5"}'

