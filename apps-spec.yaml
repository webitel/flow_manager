# Webitel Flow Manager — Apps Specification
# Version: 2.0
#
# Flow types:
#   voice      — inbound/outbound calls (type: default / voice)
#   chat       — chat conversations (type: chat)
#   form       — operator processing forms (type: processing)
#   service    — background service flows (type: service)
#
# available_in: lists which flow types support each app.
# When building a system prompt, filter by the target flow type.

# ─────────────────────────────────────────────────────────────
# UNIVERSAL APPS  (available_in: all)
# These work across every flow type.
# ─────────────────────────────────────────────────────────────

if:
  available_in: [voice, chat, form, service]
  visual: true
  description: |
    Conditional branch. Evaluates an expression and runs the 'then' sub-flow
    if the result is truthy, otherwise the 'else' sub-flow. The expression is
    pre-processed before JS evaluation: ${var}/$${var} become session/global
    variable reads, and &func(args) becomes a helper call. Users write the
    short '&' / '${}' syntax — the underlying sys.* form is an implementation
    detail.
  args:
    expression:
      required: true
      type: string
      description: |
        Expression to evaluate. Supports:
          • ${name}          — session variable
          • $${name}         — global/domain variable
          • &func(args)      — time/date helper
          • Regular JS operators: ==, !=, >, <, >=, <=, &&, ||, !, +, -, *, /, %, ?:
          • Literals: numbers, strings ('single' or "double"), booleans
        The expression's truthiness decides the branch.
    then:
      type: array
      description: "Apps to execute if the expression is truthy."
      items:
        type: object
    else:
      type: array
      description: "Apps to execute if the expression is falsy."
      items:
        type: object
  helpers:
    description: >
      Called with an '&' prefix. The argument is always passed as a STRING. Without an argument, returns the
      current value; with an argument, returns true/false if the current value
      matches the pattern.
    functions:
      "&year":
        description: "Current year (e.g. 2026). Pattern matches year numbers."
        example_matches: ["&year(2026)", "&year(2024-2026)", "&year(2024,2026)"]
      "&yday":
        description: "Day of the year (1-366)."
        example_matches: ["&yday(1-90)"]
      "&mon":
        description: "Month (1-12)."
        example_matches: ["&mon(1,12)", "&mon(6-8)"]
      "&mday":
        description: "Day of the month (1-31)."
        example_matches: ["&mday(1)", "&mday(25-31)"]
      "&week":
        description: "ISO week number of the year (1-53)."
        example_matches: ["&week(1-26)"]
      "&mweek":
        description: "Week number within the current month (1-6)."
        example_matches: ["&mweek(1)"]
      "&wday":
        description: "Day of the week. 1=Sun, 2=Mon, 3=Tue, 4=Wed, 5=Thu, 6=Fri, 7=Sat."
        example_matches: ["&wday(2-6)", "&wday(1,7)"]
      "&hour":
        description: "Hour of the day (0-23)."
        example_matches: ["&hour(9-18)"]
      "&minute":
        description: "Minute of the hour (0-59)."
        example_matches: ["&minute(0-29)"]
      "&minute_of_day":
        description: "Minute of the day (0-1440)."
        example_matches: ["&minute_of_day(540-1080)"]
      "&time_of_day":
        description: >
          Current time window check. Argument is 'HH:MM-HH:MM' ranges, comma-
          separated. Returns true if now is inside any range.
        example_matches: ["&time_of_day(09:00-18:00)", "&time_of_day(09:00-13:00,14:00-18:00)"]
      "&date_time":
        description: >
          Current datetime window check in the flow's timezone. Argument is
          'YYYY-MM-DD HH:MM:SS~YYYY-MM-DD HH:MM:SS' ranges, comma-separated.
          Returns true if now is inside any range.
        example_matches: ["&date_time(2026-12-24 00:00:00~2026-12-26 23:59:59)"]
  pattern_syntax:
    description: >
      &year / &yday / &mon / &mday / &week / &mweek / &wday / &hour / &minute /
      &minute_of_day share the same pattern format when called with an argument.
    forms:
      - "exact: '5'"
      - "range: '9-18' (inclusive; min > max is auto-swapped)"
      - "list:  '1,3,5' (any-match)"
      - "mixed: '1,3-5,7'"
  reserved_keywords:
    description: >
      These JS keywords are stripped from the expression before evaluation and
      must NOT be used: function, case, if, return, new, switch, var, this,
      typeof, for, while, break, do, continue.
      Expressions must be pure inline expressions — no statements, no
      function declarations, no control flow keywords.
  examples:
    variable_check:
      description: "Route based on an IVR selection"
      schema: |
        {"if": {
          "expression": "${ivr_choice} == '1'",
          "then": [{"bridge": {"endpoints": [{"type": "user", "extension": "100"}]}}],
          "else": [{"hangup": "NORMAL_CLEARING"}]
        }}
    business_hours:
      description: "Open queue 09:00-18:00 on weekdays (Mon-Fri = &wday(2-6))"
      schema: |
        {"if": {
          "expression": "&wday(2-6) && &time_of_day(09:00-18:00)",
          "then": [{"joinQueue": {"queue": {"id": 42}}}],
          "else": [
            {"playback": {"files": [{"type": "mp3", "id": "${closed_file_id}"}]}},
            {"hangup":  "NORMAL_CLEARING"}
          ]
        }}
    multi_window:
      description: "Split workday: 09-13 and 14-18, Mon-Fri"
      schema: |
        {"if": {
          "expression": "&wday(2-6) && &time_of_day(09:00-13:00,14:00-18:00)",
          "then": [{"joinQueue": {"queue": {"id": 42}}}],
          "else": [{"hangup": "NORMAL_CLEARING"}]
        }}
    lunch_break:
      description: "Play lunch prompt 13:00-14:00 on weekdays"
      schema: |
        {"if": {
          "expression": "&wday(2-6) && &time_of_day(13:00-14:00)",
          "then": [{"playback": {"files": [{"type": "mp3", "id": "${lunch_file_id}"}]}}],
          "else": []
        }}
    holiday_window:
      description: "Match a specific datetime range (Christmas)"
      schema: |
        {"if": {
          "expression": "&date_time(2026-12-24 00:00:00~2026-12-26 23:59:59)",
          "then": [
            {"playback": {"files": [{"id": "${holiday_file_id}"}]}},
            {"hangup":  "NORMAL_CLEARING"}
          ]
        }}
    vip_segment_global:
      description: "Combine global and session variables with comparison"
      schema: |
        {"if": {
          "expression": "$${vip_level} >= 3 && ${caller_id_number} != ''",
          "then": [{"goto": "vip_queue_branch"}],
          "else": [{"goto": "regular_queue_branch"}]
        }}
    weekend_routing:
      description: "Route weekends differently (Sat=7, Sun=1)"
      schema: |
        {"if": {
          "expression": "&wday(1,7)",
          "then": [{"joinQueue": {"queue": {"name": "weekend-support"}}}],
          "else": [{"joinQueue": {"queue": {"name": "weekday-support"}}}]
        }}
    month_and_mday:
      description: "Only on last three days of December"
      schema: |
        {"if": {
          "expression": "&mon(12) && &mday(29-31)",
          "then": [{"playback": {"files": [{"id": "${year_end_file_id}"}]}}],
          "else": []
        }}
    string_comparison:
      description: "Compare variable against string literal"
      schema: |
        {"if": {
          "expression": "${language} == 'uk'",
          "then": [{"playback": {"files": [{"id": "${greet_uk_id}"}]}}],
          "else": [{"playback": {"files": [{"id": "${greet_en_id}"}]}}]
        }}
    numeric_threshold:
      description: "Numeric comparison on a session variable"
      schema: |
        {"if": {
          "expression": "${queue_waiting} > 10",
          "then": [{"goto": "overflow_branch"}],
          "else": [{"joinQueue": {"queue": {"id": 42}}}]
        }}
    combined_time_and_var:
      description: "Time window gated by a feature flag"
      schema: |
        {"if": {
          "expression": "$${feature_after_hours} == 'on' && !&time_of_day(09:00-18:00)",
          "then": [{"goto": "after_hours_branch"}],
          "else": []
        }}
  notes:
    - "Write '&func(args)' — not 'sys.func(args)'. The parser rewrites '&' helpers, '${}' session vars, and '$${}' global vars before evaluation."
    - "Variable refs '${name}' / '$${name}' are compiled into function calls (sys.getVariable / sys.getGlobalVariable), so they can be compared directly in JS (e.g. ${x} == '1')."
    - "Helper args are always strings: '&hour(9-18)' sends '9-18' as a string; don't quote it manually."
    - "&wday numbering: 1=Sun, 2=Mon, 3=Tue, 4=Wed, 5=Thu, 6=Fri, 7=Sat — 'Mon-Fri' is &wday(2-6)."
    - "Pattern matchers accept exact ('5'), ranges ('9-18', auto-swapped if min>max), comma lists ('1,3,5'), and mixes ('1,3-5,7')."
    - "&time_of_day ranges: 'HH:MM-HH:MM'; &date_time ranges: 'YYYY-MM-DD HH:MM:SS~YYYY-MM-DD HH:MM:SS' (evaluated in flow timezone). Both accept comma-separated multiple ranges."
    - "Reserved JS keywords (function, case, if, return, new, switch, var, this, typeof, for, while, break, do, continue) are stripped from the expression — don't use them; keep expressions to pure inline logic."
    - "Both 'then' and 'else' are optional arrays."

switch:
  available_in: [voice, chat, form, service]
  visual: true
  description: "Multi-branch routing based on variable value."
  args:
    variable:
      required: true
      type: string
      description: "Variable name or ${var} template to match"
    case:
      required: true
      type: object
      description: "Key = variable value → array of apps. 'default' runs if no case matches."
  example:
    schema: |
      {"switch": {
        "variable": "${ivr_choice}",
        "case": {
          "1": [{"joinQueue": {"queue": {"id": "<SUPPORT_QUEUE_ID>"}}}],
          "2": [{"bridge": {"endpoints": [{"type": "user", "extension": "<SALES_EXT>"}]}}],
          "default": [{"goto": "ivr-menu-tag"}]
        }
      }}

while:
  available_in: [voice, chat, form, service]
  visual: true
  description: "Loop — executes body while condition is true."
  args:
    expression:
      type: string
      description: "Condition (same syntax as if)"
    do:
      type: array
      description: "Apps in the loop body"
    limit:
      type: integer
      description: "Max iterations (infinite loop protection)"

goto:
  available_in: [voice, chat, form, service]
  visual: false
  description: "Jumps to the node with the specified tag. Used for menu repeat or loops."
  args:
    type: string
    description: "Tag name of the target node"
  example:
    schema: |
      {"goto": "ivr-menu-tag"}
  notes:
    - "Target node must have tag: 'ivr-menu-tag' on its app object"
    - "Maximum 1000 jumps to prevent infinite loops"

set:
  available_in: [voice, chat, form, service]
  visual: true
  description: "Sets session variables. Supports ${variable_name} templates in values."
  args:
    type: object
    description: "Arbitrary key→value map. All values are strings."
  example:
    schema: |
      {"set": {
        "welcome_lang": "en",
        "max_tries": "3"
      }}
  notes:
    - "Values are always strings"
    - "Variables accessible anywhere via ${variable_name}"
    - "Special variables: hangup_after_bridge, transfer_ringback"

export:
  available_in: [voice, chat, form]
  visual: true
  description: "Exports session variables to child calls/chats (after bridge/transfer)."
  args:
    type: array
    items: string
  example:
    schema: |
      {"export": ["caller_language", "client_id"]}

unSet:
  available_in: [voice, chat, form, service]
  visual: true
  description: "Removes variables from the session."
  args:
    type: array
    items: string
  example:
    schema: |
      {"unSet": ["temp_var", "debug_info"]}

httpRequest:
  available_in: [voice, chat, form, service]
  visual: true
  description: "Makes an HTTP request to an external API. Can store response fields in variables."
  args:
    url:
      required: true
      type: string
      description: "URL (supports ${variables})"
    method:
      type: string
      values: [GET, POST, PUT, PATCH, DELETE]
      default: GET
    headers:
      type: object
      description: "HTTP headers key→value"
    data:
      type: string
      description: "Request body (JSON string, supports ${variables})"
    timeout:
      type: integer
      default: 1000
      description: "Timeout in milliseconds"
    responseCode:
      type: string
      description: "Variable name to store the HTTP status code"
    parser:
      type: string
      values: [application/json, application/xml, text/plain]
      description: "Force response content-type parsing (auto-detected if omitted)"
    exportVariables:
      type: object
      description: "Map: variable_name → JSON path in response body"
    insecureSkipVerify:
      type: boolean
      default: false
      description: "Skip SSL certificate verification"
    exportCookie:
      type: string
      description: "Variable name to store response Set-Cookie header"
  example:
    schema: |
      {"httpRequest": {
        "url": "https://<API_HOST>/api/client",
        "method": "POST",
        "headers": {"Content-Type": "application/json"},
        "data": "{\"phone\": \"${caller_id_number}\"}",
        "timeout": 5000,
        "responseCode": "api_status",
        "parser": "application/json",
        "exportVariables": {
          "client_name": "name",
          "client_id": "id",
          "vip_status": "is_vip"
        }
      }}

calendar:
  available_in: [voice, chat, form, service]
  visual: true
  description: "Checks business hours using a Webitel calendar. Writes result to a variable."
  args:
    name:
      type: string
      description: "Calendar name (mutually exclusive with id)"
    id:
      type: integer
      description: "Calendar ID in Webitel"
    setVar:
      required: true
      type: string
      description: "Variable to store result: 'true' or 'false' (or 'expire'/'exception' if extended: true)"
    extended:
      type: boolean
      default: false
      description: "Extended mode — returns 'expire' or exception name instead of plain false"
  notes:
    - "setVar stores the string 'true' or 'false' — ALWAYS compare explicitly: ${is_work_time} == 'true'. NEVER use bare ${is_work_time} in an if expression."
  example:
    schema: |
      {"calendar": {"name": "<CALENDAR_NAME>", "setVar": "is_work_time"}},
      {"if": {"expression": "${is_work_time} == 'true'", "then": [...], "else": [...]}}

log:
  available_in: [voice, chat, form, service]
  visual: true
  description: "Writes a message to the schema execution log (debugging)."
  args:
    type: string
    description: "Message text, supports ${variables}"
  example:
    schema: |
      {"log": "choice=${ivr_choice} caller=${caller_id_number}"}

softSleep:
  available_in: [voice, chat, form, service]
  visual: true
  description: "Pauses schema execution for a given duration."
  args:
    type: integer
    description: "Duration in milliseconds"
  example:
    schema: |
      {"softSleep": 2000}

schema:
  available_in: [voice, chat, form, service]
  visual: true
  description: |
    Calls another Webitel flow (schema) by ID or name. Useful for reusable sub-flows
    shared across multiple flows (e.g. dynamic amount calculation, notification logic).
    With async: true — fires and forgets; with async: false — waits for it to finish.
  args:
    id:
      type: integer
      description: "Schema ID to execute. Use id or name (not both)."
    async:
      type: boolean
      default: false
      description: "If true — runs the sub-schema in background without waiting."
  examples:
    sync_by_id:
      description: "Call sub-flow synchronously by ID"
      schema: |
        {"schema": {"id": 165, "async": false}}
    async_by_name:
      description: "Fire sub-flow asynchronously by name"
      schema: |
        {"schema": {"async": true,"id": 165}}

cache:
  available_in: [voice, chat, form, service]
  visual: false
  description: "Read from or write to Redis cache. Useful for sharing data between flows or storing AI-generated content (e.g. ChatGPT suggestions) keyed by caller/email ID."
  args:
    type:
      type: string
      required: true
      values: [redis]
      description: "Cache backend — currently only 'redis' is supported"
    action:
      type: string
      required: true
      values: [get, set, delete]
      description: "Operation to perform"
    get:
      type: object
      description: "Used when action=get. Map of {flow_variable: cache_key}. Reads cache_key and stores result in flow_variable."
      example: '{"ai_suggestion": "${destination}"}'
    set:
      type: object
      description: "Used when action=set. Contains 'data' (map of {cache_key: value}) and 'ttl' (seconds as string)."
      fields:
        data:
          type: object
          description: "Map of cache_key → value to store"
        ttl:
          type: string
          description: "Time-to-live in seconds (as string, e.g. '3600')"
    delete:
      type: object
      description: "Used when action=delete. Contains 'keys' array of cache keys to remove."
      fields:
        keys:
          type: array
          items: string
          description: "List of cache keys to delete"
  examples:
    get_ai_suggestion:
      description: "Read an AI-generated suggestion from cache into flow variable"
      schema: |
        {"cache": {
          "action": "get",
          "type": "redis",
          "get": {"ai_suggestion": "${destination}"}
        }}
    set_value:
      description: "Store a value in cache for 1 hour"
      schema: |
        {"cache": {
          "action": "set",
          "type": "redis",
          "set": {
            "data": {"customer_status": "${crm_status}"},
            "ttl": "3600"
          }
        }}
    delete_key:
      description: "Remove a cached key"
      schema: |
        {"cache": {
          "action": "delete",
          "type": "redis",
          "delete": {"keys": ["customer_status"]}
        }}
  notes:
    - "Cache is scoped to the domain — keys are isolated per Webitel tenant"
    - "Use TTL to avoid stale data; omitting TTL may result in indefinite storage"
    - "Typical use: pre-compute AI suggestions and cache by caller ID or email ID before call/email arrives"
classifier:
  available_in: [voice, chat, form, service]
  visual: true
  description: |
    Keyword/phrase classifier. Matches text input against user-defined category clusters
    and stores the matched category name in a variable. Fast, deterministic, no LLM call.
    Typically used after STT to route by intent. Use switch/if on the result variable.
    Returns empty string if no cluster matches.
  args:
    input:
      required: true
      type: string
      description: "Text to classify — usually an STT result variable, e.g. ${stt_result} or ${google_transcript}"
    set:
      required: true
      type: string
      description: "Variable name to store the matched category name. Empty if no match."
    cluster:
      required: true
      description: |
        Category definitions:
        Object — map of {category_name: [phrases]}. Use with matchType=full.
    matchType:
      type: string
      values: [full, part]
      description: |
        full — whole-word / exact phrase match (default).
        part — substring match; finds the cluster whose phrase appears anywhere in input.
    phraseSearch:
      type: boolean
      default: false
      description: "When true, matches multi-word phrases as a whole rather than individual tokens."
  examples:
    intent_routing:
      description: "Classify STT transcript into intent buckets (array cluster, substring match)"
      schema: |
        {"classifier": {
          "input": "${speech_lower}",
          "matchType": "part",
          "phraseSearch": true,
          "set": "intent",
          "cluster": {
            "billing": ["invoice", "payment", "bill", "tariff"],
            "tech_support": ["not working", "problem", "error", "internet"],
            "general": ["question", "info", "help", "consultation"]
          }
        }}
    yes_no:
      description: "Simple yes/no detection (object cluster, exact match)"
      schema: |
        {"classifier": {
          "input": "${google_transcript}",
          "matchType": "full",
          "phraseSearch": true,
          "set": "answer",
          "cluster": {
            "yes": ["yes", "sure", "correct", "ok", "agreed"],
            "no":  ["no", "wrong number", "not me", "who is this"]
          }
        }}
  notes:
    - "Result variable is empty string when no cluster matches — always handle the no-match case in switch/if"
    - "Prefer matchType=part for open-ended STT transcripts; matchType=full for tightly controlled yes/no prompts"
    - "classifier is lightweight (no LLM). Combine with httpRequest→GPT as a fallback for ambiguous input"

# ─────────────────────────────────────────────────────────────
# VOICE-ONLY APPS  (available_in: [voice])
# ─────────────────────────────────────────────────────────────

ringReady:
  available_in: [voice]
  visual: true
  description: "Sends SIP 180 Ringing to the caller. Does NOT answer the call — caller hears standard ringback tone. Use before preAnswer or answer to signal the call is being processed."
  args: ""
  example:
    schema: |
      {"ringReady": ""}
  notes:
    - "Sends SIP 180 — no media channel opened yet"
    - "Prevents PBX/carrier from playing their own ringback tone"
    - "Typically placed before preAnswer or answer"

preAnswer:
  available_in: [voice]
  visual: true
  description: "Opens early media channel (SIP 183 Session Progress) without fully answering the call. Allows playing audio or collecting DTMF before the call is billed."
  args: ""
  example:
    schema: |
      {"preAnswer": ""}
  notes:
    - "Sends SIP 183 — media channel opens but call is not yet answered"
    - "Useful for IVR prompts before answer (avoids billing until answer)"
    - "Follow with answer when you want to fully accept the call"
    - "Common sequence: ringReady → preAnswer → playback → answer"

answer:
  available_in: [voice]
  visual: true
  description: "Answers the inbound call. Required before playback or bridge."
  args: ""
  example:
    schema: |
      {"answer": ""}

echo:
  available_in: [voice]
  visual: false
  description: "Echoes caller audio back with an optional delay. Useful for testing audio path, microphone, and speaker quality end-to-end."
  args:
    type: integer
    description: "Delay in milliseconds before echoing audio back (0 = immediate echo)"
    default: 0
  examples:
    immediate:
      description: "Immediate echo — no delay"
      schema: |
        {"echo": ""}
    with_delay:
      description: "Echo with 500ms delay"
      schema: |
        {"echo": 500}
  notes:
    - "For testing only — always replace with real routing in production flows"
    - "Caller hears their own voice; useful to verify codec and audio quality"
    - "Common pattern: set → export → preAnswer → ringReady → answer → recordSession → echo"

hangup:
  available_in: [voice]
  visual: true
  description: "Terminates the call with the specified ITU-T Q.850 cause code string."
  args:
    type: string
    values:
      - "NORMAL_CLEARING"          # Q.850 16 — normal end of call (most common)
      - "USER_BUSY"                # Q.850 17 / SIP 486 — callee is busy
      - "NO_USER_RESPONSE"         # Q.850 18 / SIP 408 — no response from user
      - "NO_ANSWER"                # Q.850 19 / SIP 480 — no answer (ring timeout)
      - "CALL_REJECTED"            # Q.850 21 / SIP 603 — call explicitly rejected
      - "NUMBER_CHANGED"           # Q.850 22 / SIP 410 — number changed/disconnected
      - "UNALLOCATED_NUMBER"       # Q.850 1  / SIP 404 — number does not exist
      - "NO_ROUTE_DESTINATION"     # Q.850 3  / SIP 404 — no route to destination
      - "DESTINATION_OUT_OF_ORDER" # Q.850 27 / SIP 502 — destination unreachable
      - "RECOVERY_ON_TIMER_EXPIRE" # Q.850 102/ SIP 504 — gateway timeout
      - "ORIGINATOR_CANCEL"        # caller hung up before answer
      - "MANAGER_REQUEST"          # Q.850 605/ SIP 503 — terminated by operator/admin
      - "ABANDONED"                # Q.850 687 — call abandoned (e.g. left queue)
      - "USER_NOT_REGISTERED"      # Q.850 606 — SIP user not registered
      - ""                         # no specific cause (system default)
  notes:
    - "Use NORMAL_CLEARING for all expected end-of-flow terminations."
    - "Use CALL_REJECTED when the flow intentionally refuses the call (blacklist, out-of-hours with no callback)."
    - "Use ORIGINATOR_CANCEL only to label a hangup that happened because the caller disconnected — do not set this manually to end a flow."
    - "ABANDONED is set automatically when a caller leaves a queue; do not set it manually."
  example:
    schema: |
      {"hangup": "NORMAL_CLEARING"}

playback:
  available_in: [voice]
  visual: true
  description: "Plays audio file(s). Optionally waits for DTMF input (IVR) or voice (STT)."
  args:
    files:
      required: true
      type: array
      items:
        type: object
        fields:
          type:
            type: string
            values: [mp3, wav, ogg, silence, tone, local_stream]
            description: "'silence' = pause, name = duration ms"
          id:
            type: integer
            description: "File ID in Webitel media storage"
          name:
            type: string
            description: "File name or silence duration in ms"
    terminator:
      type: string
      default: "#"
      description: "DTMF key that interrupts playback"
    getDigits:
      type: object
      description: "If set — waits for DTMF input after playback (IVR menu)"
      fields:
        setVar:
          required: true
          type: string
          description: "Variable to store the digit(s) pressed"
        min:
          type: integer
          default: 1
        max:
          type: integer
          default: 1
        tries:
          type: integer
          default: 3
          description: "Retries on invalid input"
        timeout:
          type: integer
          description: "Wait timeout in milliseconds"
        regexp:
          type: string
          description: "Validation regexp (e.g. ^[1-5]$)"
        flushDTMF:
          type: boolean
          default: false
    getSpeech:
      type: object
      description: |
        If set — captures caller speech (STT) while/after playback completes.
        This is the primary STT mechanism used in Webitel voice bots.
        Typically files contains a short silence first, then recognition runs.
        Uses Google Speech-to-Text under the hood.
        Transcript stored in the variable named by setVar.
      fields:
        setVar:
          required: true
          type: string
          description: "Variable to store the recognized transcript."
        lang:
          required: true
          type: string
          description: "BCP-47 language code (e.g. uk-UA, en-US, ru-RU)."
        recognizer:
          type: string
          description: "Google STT recognizer path, e.g. 'projects/${stt_project}/locations/eu'."
        uri:
          type: string
          description: "Google STT endpoint, e.g. 'eu-speech.googleapis.com'."
        model:
          type: string
          default: "short"
          description: "Google STT model. Values: `short`, `long`, `telephony`, `medical_dictation`."
          values: ["short", "long", "telephony", "medical_dictation"]
        timeout:
          type: integer
          default: 5000
          description: "Max wait time in milliseconds before giving up."
        vadTimeout:
          type: integer
          description: "Voice Activity Detection silence timeout in ms. Ends capture when silence detected."
        singleUtterance:
          type: boolean
          default: false
          description: "Stop after first complete utterance."
        interim:
          type: boolean
          default: false
          description: "Return interim (partial) results before final transcript."
        alternativeLang:
          type: array
          description: "Additional language codes for multilingual recognition."
        hints:
          type: string
          description: "Comma-separated hint phrases to boost recognition accuracy."
        maxAlternatives:
          type: integer
          default: 1
          description: "Number of alternative transcripts to return."
        profanityFilter:
          type: boolean
          default: false
        punctuation:
          type: boolean
          default: false
        enhanced:
          type: boolean
          default: false
          description: "Use enhanced model (higher quality, higher cost)."
        breakFinalOnTimeout:
          type: boolean
          default: true
          description: "Stop waiting and return empty transcript on timeout."
        disableBreakFinal:
          type: boolean
          default: false
        separateRecognition:
          type: boolean
          default: false
        wordTime:
          type: boolean
          default: false
          description: "Include word-level timestamps in result."
        version:
          type: string
          default: "v2"
          description: "STT API version. 'v2' = Google Speech-to-Text v2. 'v3' = Scribe engine (newer, supports profile and extraParams)."
          values: ["v2", "v3"]
        profile:
          type: object
          description: "STT profile to use (version v3 / Scribe only). {id: int}"
          fields:
            id: {type: integer, description: "Scribe profile ID configured in Webitel."}
        extraParams:
          type: object
          description: |
            Arbitrary engine-specific parameters passed through to the STT backend (version v3 / Scribe).
            Common keys: include_language_detection (bool), min_silence_duration_ms, min_speech_duration_ms,
            vad_silence_threshold_secs, vad_threshold.
        maxWords:
          type: integer
          description: "Stop recognition after this many words."
        minWords:
          type: integer
          description: "Require at least this many words before considering the utterance complete."
  notes:
    - "getSpeech and getDigits are mutually exclusive — use one per playback step."
    - "For getSpeech, a common pattern is files: [{type: silence, name: '10'}] — a 10ms silence to trigger the STT listener before the caller speaks."
    - "The recognized transcript is stored in the variable specified by getSpeech.setVar (commonly google_transcript)."
    - "After getSpeech, use classifier or switch on the transcript variable to branch by intent."
    - "version: 'v2' uses Google Speech-to-Text directly (recognizer + uri required). version: 'v3' uses the Scribe engine (profile.id required, extraParams supported)."
  examples:
    simple:
      description: "Play a file"
      schema: |
        {"playback": {"files": [{"type": "mp3", "id": "<FILE_ID>"}]}}
    ivr_menu:
      description: "IVR digit capture"
      schema: |
        {"playback": {
          "files": [{"type": "mp3", "id": "<MENU_FILE_ID>"}],
          "getDigits": {
            "setVar": "ivr_choice", "min": 1, "max": 1,
            "tries": 3, "timeout": 5000, "regexp": "^[1-5]$"
          }
        }}
    stt_capture:
      description: "Play question audio then capture voice response"
      schema: |
        {"playback": {
          "files": [{"name": "<QUESTION_FILE>.wav"}]
        }}

        {"playback": {
          "files": [{"type": "silence", "name": "10"}],
          "getSpeech": {
            "setVar": "google_transcript",
            "lang": "uk-UA",
            "recognizer": "projects/${stt_project}/locations/eu",
            "uri": "eu-speech.googleapis.com",
            "model": "short",
            "timeout": 9000,
            "vadTimeout": "${vadTimeout}",
            "interim": true,
            "singleUtterance": false,
            "breakFinalOnTimeout": true,
            "alternativeLang": ["ru-RU"]
          }
        }}
    silence:
      description: "Silent pause"
      schema: |
        {"playback": {"files": [{"type": "silence", "name": "2000"}]}}

bridge:
  available_in: [voice]
  visual: true
  description: "Connects the current call (A-leg) to another party or external number (B-leg). VOICE: dials via SIP endpoint/gateway; after bridge ends, execution continues flat — NO 'timers' field in bridge."
  args:
    endpoints:
      required: true
      type: array
      items:
        type: object
        fields:
          type:
            required: true
            type: string
            values: [user, gateway]
            description: "'user'=internal Webitel operator, 'gateway'=external SIP gateway"
          id:
            type: integer
            description: "User or gateway ID in Webitel"
          extension:
            type: string
            description: "Internal extension (for type=user)"
          dialString:
            type: string
            description: "Phone number to dial via gateway. Alternative to destination."
          gateway:
            type: object
            description: "SIP gateway selector by ID (use with destination)"
            fields:
              id: {type: integer}
              name: {type: string}
          parameters:
            type: object
            description: |
              Per-endpoint SIP channel variables. Common keys:
                leg_timeout=15          — ring timeout in seconds for this endpoint
                leg_delay_start=5       — delay before ringing this endpoint
                origination_caller_id_number=380XXXXXXXXX — override caller ID
                ignore_early_media=true — ignore early media from endpoint
                instant_ringback=true   — send ringback immediately
          idle:
            type: boolean
            description: "Only bridge if operator is currently idle (type=user only)"
    strategy:
      type: string
      values: [failover, multiply]
      description: "'failover'=try endpoints in order until one answers, 'multiply'=dial all simultaneously (first to answer wins). Omit for single endpoint."
    parameters:
      type: object
      description: |
        Global SIP channel variables applied to the entire bridge. Common keys:
          continue_on_fail=true   — if true, continue flow after failed bridge (all endpoints busy/no answer)
          hangup_after_bridge=true — hang up A-leg when B-leg hangs up (default: false = flow continues)
          ignore_early_media=true
          instant_ringback=true
          call_timeout=60         — total bridge timeout in seconds
  notes:
    - "IMPORTANT: There is NO 'timers' field in bridge. The no-answer fallback is handled by the steps that come AFTER bridge in the flat sequence."
    - "Use 'set' BEFORE bridge to set continue_on_fail and hangup_after_bridge: {\"set\": {\"continue_on_fail\": \"false\", \"hangup_after_bridge\": \"true\"}}"
    - "For gateway dialing: type='gateway', destination=phone number, gateway={id: <ID>}, parameters={leg_timeout: '15', origination_caller_id_number: '380XXXXXXXXX'}. NEVER put gateway id directly on endpoint root — always nest it: gateway: {id: <ID>}"
    - "strategy='failover': tries endpoints one by one. strategy='multiply': dials all at once, first answer wins."
    - "After bridge: if no endpoint answered and continue_on_fail=true, the next steps run (e.g. joinQueue fallback)."
    - "CRITICAL: bridge does NOT set any ${_result} variable. ${_result} does not exist in Webitel sessions — never use it. To detect bridge failure use continue_on_fail=true and add fallback steps after bridge."
    - "NEVER use type='sip' — it does not exist. Valid endpoint types are ONLY: user, gateway, destination."
    - "NEVER put continue_on_fail or hangup_after_bridge inside bridge args — they are channel variables. Always set them via {\"set\": {\"continue_on_fail\": \"true\"}} BEFORE bridge."
    - "NEVER put 'timeout' inside bridge.parameters — ring timeout belongs in endpoint.parameters.leg_timeout (string, not integer): {\"parameters\": {\"leg_timeout\": \"15\"}}"
  examples:
    internal_user:
      description: "Bridge to internal operator by extension"
      schema: |
        {"set": {"continue_on_fail": "true", "hangup_after_bridge": "true"}},
        {"bridge": {"endpoints": [{"type": "user", "extension": "<EXTENSION>"}]}}
    gateway_by_name:
      description: "Bridge to mobile via named SIP gateway (dialString + name format)"
      schema: |
        {"set": {"continue_on_fail": "true", "hangup_after_bridge": "true"}},
        {"bridge": {
          "endpoints": [{
            "type": "gateway",
            "dialString": "<MOBILE_NUMBER>",
            "name": "<GATEWAY_NAME>",
            "parameters": {
              "origination_caller_id_number": "<CALLER_ID>",
              "leg_timeout": "15"
            }
          }]
        }},
        {"playback": {"files": [{"id": "<NO_ANSWER_FILE_ID>", "name": "no_answer.wav"}]}},
        {"joinQueue": {"queue": {"id": "<QUEUE_ID>"}}}
    gateway_by_id:
      description: "Bridge to mobile via gateway ID (destination + gateway.id format)"
      schema: |
        {"set": {"continue_on_fail": "true", "hangup_after_bridge": "true"}},
        {"bridge": {
          "endpoints": [{
            "type": "gateway",
            "dialString": "+1<MOBILE_NUMBER>",
            "gateway": {"id": "<GATEWAY_ID>"},
            "parameters": {
              "origination_caller_id_number": "<CALLER_ID>",
              "leg_timeout": "15"
            }
          }]
        }},
        {"playback": {"files": [{"id": "<NO_ANSWER_FILE_ID>", "name": "no_answer.wav"}]}},
        {"joinQueue": {"queue": {"id": "<QUEUE_ID>"}}}

joinQueue:
  available_in: [voice, chat]
  visual: true
  description: "Puts a call or chat into an inbound queue. Waits until an agent picks it up or the caller/visitor abandons."
  args:
    queue:
      required: true
      type: object
      fields:
        id:
          type: integer
          description: "Queue ID in Webitel"
        name:
          type: string
          description: "Queue name (if ID is unknown)"
    priority:
      type: integer
      default: 0
      description: "Higher value = higher priority"
    bucket:
      type: object
      fields:
        id:
          type: integer
          description: "Bucket ID for member segmentation"
    agent:
      type: object
      description: "Preferred agent to route to"
      fields:
        extension: {type: string}
        id: {type: integer}
    ringtone:
      type: object
      description: "Hold music played to caller while waiting"
      fields:
        id: {type: integer}
        name: {type: string}
    timers:
      type: array
      description: |
        Actions to execute periodically while the caller is waiting in queue.
        Each timer object has:
          interval — interval in seconds between executions
          tries    — how many times to repeat
          actions  — array of schema steps to run (e.g. playback a promotional message)
    transferAfterBridge:
      type: object
      description: "Transfer the call to another schema after the agent bridge ends"
      fields:
        id:
          type: integer
          description: "Schema ID to transfer to after bridge"
    offering:
      type: array
      description: "CHAT ONLY — apps to run when an agent is offered the chat"
    missed:
      type: array
      description: "CHAT ONLY — apps to run when agent misses the chat"
    bridged:
      type: array
      description: "CHAT ONLY — apps to run when agent accepts the chat"
  examples:
    simple:
      description: "Basic voice queue with hold music"
      schema: |
        {"joinQueue": {
          "queue": {"id": "<QUEUE_ID>"},
          "ringtone": {"id": "<MOH_FILE_ID>"}
        }}
    with_timers:
      description: "Voice queue with periodic promotional playback every minute, up to 20 times"
      schema: |
        {"joinQueue": {
          "queue": {"id": "<QUEUE_ID>"},
          "ringtone": {"id": "<MOH_FILE_ID>"},
          "priority": 100,
          "timers": [
            {
              "interval": 60,
              "tries": 20,
              "actions": [
                {"playback": {"files": [{"name": "<PROMO_FILE>"}]}}
              ]
            }
          ]
        }}
    chat:
      description: "Chat queue with agent-offer message"
      schema: |
        {"joinQueue": {
          "queue": {"id": "<QUEUE_ID>"},
          "offering": [{"sendText": "Connecting you with an agent..."}]
        }}

recordSession:
  available_in: [voice]
  visual: true
  description: "Records the call. Typically placed immediately after answer."
  args:
    action:
      type: string
      values: [start, stop]
      default: start
    name:
      type: string
      default: "${strepoch()}_${caller_id_number}_${destination_number}"
    type:
      type: string
      values: [mp3, wav, ogg]
      default: mp3
    stereo:
      type: boolean
      default: false
      description: "Separate channels for caller and agent"
    bridged:
      type: boolean
      default: false
      description: "Record only during bridge"
    minSec:
      type: integer
      default: 2
      description: "Minimum duration to save the recording (seconds)"
    followTransfer:
      type: boolean
      default: true
  example:
    schema: |
      {"recordSession": {
        "action": "start", "stereo": false,
        "minSec": 2, "followTransfer": true, "type": "mp3"
      }}

scheduleHangup:
  available_in: [voice]
  visual: false
  description: "Schedules automatic hangup after N seconds."
  args:
    type: object
    fields:
      seconds:
        required: true
        type: integer
        description: "Seconds until forced hangup"
      cause:
        type: string
        default: "NORMAL_CLEARING"
  example:
    schema: |
      {"scheduleHangup": {"seconds": 300, "cause": "NORMAL_CLEARING"}}

# ─────────────────────────────────────────────────────────────
# CHAT-ONLY APPS  (available_in: [chat])
# ─────────────────────────────────────────────────────────────

sendMessage:
  available_in: [chat]
  visual: true
  description: "Sends a rich message to the chat (text + optional file, buttons)."
  args:
    text:
      type: string
      description: "Message text (supports ${variables})"
    file:
      type: object
      description: "Attach a file by ID or URL"
      fields:
        id: {type: integer, description: "File ID in Webitel media storage"}
        url: {type: string, description: "Public file URL"}
    buttons:
      type: array
      description: "Button rows — array of arrays of button objects (keyboard)"
      items:
        type: array
        items:
          type: object
          fields:
            caption: {type: string, description: "Button label displayed to user"}
            text: {type: string, description: "Text sent when button is pressed"}
            type: {type: string, values: [text, url], description: "'url' opens a link"}
            url: {type: string, description: "URL for type=url buttons"}
    inline:
      type: array
      description: "Inline keyboard buttons (appear below message, not as reply keyboard)"
    noInput:
      type: boolean
      default: false
      description: "Hide text input field after sending"
  examples:
    simple_text:
      schema: |
        {"sendMessage": {"text": "Hello! How can I help you?"}}
    with_buttons:
      schema: |
        {"sendMessage": {
          "text": "Please choose an option:",
          "buttons": [
            [{"caption": "Support", "text": "support"}],
            [{"caption": "Sales",   "text": "sales"}]
          ]
        }}

sendText:
  available_in: [chat]
  visual: true
  description: "DEPRECATED — use sendMessage instead. Sends plain text only, no buttons or files."
  args:
    type: string
    description: "Message text (supports ${variables})"
  example:
    schema: |
      {"sendText": "Your request has been received."}

menu:
  available_in: [chat]
  visual: true
  description: "Sends a menu with buttons and waits for the user's selection."
  args:
    text:
      type: string
      description: "Menu prompt text"
    type:
      type: string
      values: [buttons, inline]
      default: buttons
      description: "'buttons' = reply keyboard, 'inline' = inline keyboard"
    buttons:
      type: array
      description: "Button rows for type=buttons"
      items:
        type: array
        items:
          type: object
          fields:
            caption: {type: string}
            text: {type: string}
    inline:
      type: array
      description: "Button rows for type=inline"
    noInput:
      type: boolean
      default: false
  example:
    schema: |
      {"menu": {
        "text": "Choose department:",
        "type": "buttons",
        "buttons": [
          [{"caption": "Tech Support", "text": "support"}],
          [{"caption": "Sales",        "text": "sales"}],
          [{"caption": "Billing",      "text": "billing"}]
        ]
      }}

recvMessage:
  available_in: [chat]
  visual: true
  description: "Waits for the next message from the user and stores it in a variable."
  args:
    set:
      required: true
      type: string
      description: "Variable name to store received message text"
    timeout:
      type: integer
      description: "Wait timeout in seconds"
    messageTimeout:
      type: integer
      description: "Inactivity timeout in seconds"
    delimiter:
      type: string
      default: " "
      description: "Separator if multiple messages arrive"
  example:
    schema: |
      {"recvMessage": {"set": "user_input", "timeout": 60}}

sendFile:
  available_in: [chat]
  visual: true
  description: "Sends a file attachment to the chat."
  args:
    type: object
    description: "File ID or URL to attach"

sendAction:
  available_in: [chat]
  visual: false
  description: "Sends a chat action indicator (e.g. typing indicator)."
  args:
    action:
      type: string
      values: [typing, cancel]
  example:
    schema: |
      {"sendAction": {"action": "typing"}}

# ─────────────────────────────────────────────────────────────
# FORM/PROCESSING APPS  (available_in: [form])
# Used in operator processing flows (type: processing)
# ─────────────────────────────────────────────────────────────

formComponent:
  available_in: [form]
  visual: false
  description: "Defines a UI component that will appear inside an operator form. Must be referenced by generateForm body."
  args:
    id:
      required: true
      type: string
      description: "Unique component ID within the form. Referenced in generateForm body array."
    view:
      required: true
      type: object
      description: "Visual configuration"
      fields:
        component:
          required: true
          type: string
          values:
            - "form-text"         # read-only text block
            - "wt-input"          # editable text input
            - "wt-select"         # dropdown select
            - "wt-textarea"       # multi-line text area
            - "wt-datetimepicker" # date/time picker
            - "form-i-frame"      # embedded iframe
            - "rich-text-editor"  # HTML rich text editor
          description: "UI component type"
        label:
          type: string
          description: "Field label shown to operator"
        hint:
          type: string
          description: "Helper text below the field"
        initialValue:
          type: string
          description: "Pre-filled value (supports ${variables})"
        color:
          type: string
          values: [primary, secondary, accent, warning, danger]
          description: "Visual accent color (for form-text)"
        collapsible:
          type: boolean
          description: "Whether the component can be collapsed"
        enableCopying:
          type: boolean
          description: "Show copy-to-clipboard button (for form-text)"
        readonly:
          type: boolean
          description: "Prevent operator from editing"
        options:
          type: array
          description: "Options list for wt-select component"
          items:
            type: object
            fields:
              name: {type: string, description: "Display label"}
              value: {type: string, description: "Stored value"}
        multiple:
          type: boolean
          description: "Allow multiple selection (wt-select)"
        output:
          type: string
          values: [html, text]
          description: "Output format for rich-text-editor"
  examples:
    read_only_text:
      description: "Display client info as read-only text"
      schema: |
        {"formComponent": {
          "id": "client-info",
          "view": {
            "component": "form-text",
            "label": "Client Information",
            "initialValue": "Phone: ${caller_id_number}\nName: ${client_name}",
            "collapsible": false,
            "enableCopying": true
          }
        }}
    editable_input:
      description: "Text input for operator to fill in"
      schema: |
        {"formComponent": {
          "id": "operator-note",
          "view": {
            "component": "wt-input",
            "label": "Note",
            "hint": "Enter a brief note about this call",
            "initialValue": ""
          }
        }}
    dropdown_select:
      description: "Dropdown with predefined options"
      schema: |
        {"formComponent": {
          "id": "call-reason",
          "view": {
            "component": "wt-select",
            "label": "Call Reason",
            "options": [
              {"name": "Technical Issue", "value": "technical"},
              {"name": "Billing",         "value": "billing"},
              {"name": "General Info",    "value": "info"}
            ]
          }
        }}
    rich_text_editor:
      description: "HTML editor for composing email replies"
      schema: |
        {"formComponent": {
          "id": "reply-body",
          "view": {
            "component": "rich-text-editor",
            "label": "Reply Text",
            "initialValue": "Dear Customer,<br/><br/>",
            "output": "html"
          }
        }}

formFile:
  available_in: [form]
  visual: true
  description: "File upload/display component inside an operator form."
  args:
    id:
      required: true
      type: string
      description: "Unique component ID. Referenced in generateForm body array."
    view:
      type: object
      fields:
        label: {type: string}
        hint: {type: string}
        initialValue:
          type: string
          description: "Pre-filled files variable (e.g. ${attachments})"
        readonly:
          type: boolean
          description: "Display only — no upload allowed"
        collapsible: {type: boolean}
        component:
          type: string
          default: "form-file"
  examples:
    display_attachments:
      description: "Show existing attachments (read-only)"
      schema: |
        {"formFile": {
          "id": "email-attachments",
          "view": {
            "label": "Attachments",
            "initialValue": "${files}",
            "readonly": true,
            "collapsible": false
          }
        }}
    upload_files:
      description: "Allow operator to upload new files"
      schema: |
        {"formFile": {
          "id": "reply-files",
          "view": {
            "label": "Add Files",
            "initialValue": "",
            "readonly": false,
            "collapsible": true
          }
        }}

generateForm:
  available_in: [form]
  visual: true
  description: "Renders the operator form. Must be called AFTER all formComponent/formFile definitions. Waits for operator action."
  args:
    id:
      required: true
      type: string
      description: "Form ID. The action chosen by operator is saved in variable with this name."
    title:
      type: string
      description: "Form title shown at top"
    body:
      required: true
      type: array
      items: string
      description: "Ordered list of component IDs to display (must be defined before this app)"
    actions:
      required: true
      type: array
      description: "Action buttons shown to operator"
      items:
        type: object
        fields:
          id:
            type: string
            description: "Action ID saved to form variable when pressed"
          view:
            type: object
            fields:
              text: {type: string, description: "Button label"}
              color:
                type: string
                values: [primary, success, danger, warning, accent]
  example:
    schema: |
      {"generateForm": {
        "id": "my-form",
        "title": "Process Request",
        "body": ["client-info", "operator-note", "call-reason"],
        "actions": [
          {"id": "submit", "view": {"text": "Submit",          "color": "success"}},
          {"id": "cancel", "view": {"text": "Return to Queue", "color": "danger"}}
        ]
      }}
  notes:
    - "After generateForm, use if/switch on ${my-form} to handle the action chosen"
    - "Component IDs in body must be registered before generateForm runs"

attemptResult:
  available_in: [form]
  visual: true
  description: "Closes the current operator attempt with a result status. Typically the last step."
  args:
    status:
      required: true
      type: string
      values: [success, abandoned, missed]
      description: "Outcome status. 'success'=completed, 'abandoned'=returned to queue, 'missed'=skipped."
    description:
      type: string
      description: "Optional free-text note."
    variables:
      type: object
      description: "Key-value map (string → string) attached to the subscriber/contact. Use to persist custom data tied to the communication (e.g. tags, external IDs, form answers). Keys and values must be strings."
      example: {"order_id": "A-1042", "segment": "vip"}
    stickyDisplay:
      type: boolean
      default: false
      description: "If true, sticks the outbound caller ID (the number used on this call) to the subscriber. Subsequent dials to the same subscriber will reuse the same display number."
    waitBetweenRetries:
      type: integer
      required: false
      description: "Optional. Delay in seconds before the next retry attempt to this subscriber. Applies only when status is not 'success' (i.e. 'abandoned' or 'missed'). If omitted, the queue's default retry interval is used."
  examples:
    success:
      schema: |
        {"attemptResult": "success", "description": ""}
    abandoned:
      schema: |
        {"attemptResult": "abandoned", "description": "No answer", "waitBetweenRetries": 300}
    with_variables:
      schema: |
        {"attemptResult": "success", "variables": {"order_id": "A-1042", "segment": "vip"}, "stickyDisplay": true}

# ─────────────────────────────────────────────────────────────
# UNIVERSAL — STRING / MATH / JS
# ─────────────────────────────────────────────────────────────

string:
  available_in: [voice, chat, form, service]
  visual: true
  description: "Applies a string transformation function to data and stores result in a variable."
  args:
    setVar:
      required: true
      type: string
      description: "Variable to store the result"
    fn:
      required: true
      type: string
      description: "Function name"
      values:
        reverse:     "Reverses the string"
        charAt:      "Returns character at position (args: [index])"
        length:      "Returns string length as string"
        base64:      "Base64 encode/decode (args: ['encoder'] or ['decoder'])"
        MD5:         "MD5 hash of the string"
        SHA-256:     "SHA-256 hash"
        SHA-512:     "SHA-512 hash"
        gomatch:     "Regexp match, returns captured groups (args: ['regexp'])"
        toUpperCase: "Native JS String method — uppercase"
        toLowerCase: "Native JS String method — lowercase"
        trim:        "Native JS String method — trim whitespace"
        split:       "Native JS String method — split by delimiter (args: [delimiter])"
        replace:     "Native JS String method — replace (args: [search, replacement])"
        includes:    "Native JS String method — returns 'true'/'false'"
        indexOf:     "Native JS String method — position of substring"
        slice:       "Native JS String method — substring (args: [start, end])"
    data:
      required: true
      type: string
      description: "Input string (supports ${variables})"
    args:
      type: array
      description: "Additional arguments depending on fn (see fn values above)"
  examples:
    uppercase:
      schema: |
        {"string": {"setVar": "name_upper", "fn": "toUpperCase", "data": "${client_name}"}}
    md5:
      schema: |
        {"string": {"setVar": "phone_hash", "fn": "MD5", "data": "${caller_id_number}"}}
    base64_encode:
      schema: |
        {"string": {"setVar": "encoded", "fn": "base64", "data": "${token}", "args": ["encoder"]}}
    regexp_match:
      schema: |
        {"string": {"setVar": "match_result", "fn": "gomatch", "data": "${user_input}", "args": ["^[0-9]{10}$"]}}

math:
  available_in: [voice, chat, form, service]
  visual: true
  description: "Applies a Math function or picks a random value from a list."
  args:
    setVar:
      required: true
      type: string
      description: "Variable to store the result"
    fn:
      type: string
      default: random
      description: "Math function name"
      values:
        random:  "Pick a random element from data array (Webitel custom)"
        round:   "JS Math.round"
        floor:   "JS Math.floor"
        ceil:    "JS Math.ceil"
        abs:     "JS Math.abs"
        max:     "JS Math.max — returns max from data array"
        min:     "JS Math.min — returns min from data array"
        pow:     "JS Math.pow (args: [base, exponent])"
        sqrt:    "JS Math.sqrt"
        PI:      "Returns Math.PI"
    data:
      type: array
      description: "Input values (numbers or strings depending on fn)"
  examples:
    random_pick:
      description: "Pick a random greeting from a list"
      schema: |
        {"math": {"setVar": "greeting", "fn": "random", "data": ["Hello!", "Hi there!", "Welcome!"]}}
    round:
      schema: |
        {"math": {"setVar": "rounded", "fn": "round", "data": ["${raw_score}"]}}

js:
  available_in: [voice, chat, form, service]
  visual: true
  description: "Executes inline JavaScript (max 1 second timeout). Result stored in setVar."
  args:
    data:
      required: true
      type: string
      description: |
        JS code. Variables pre-substituted via ${name} before execution.
        Must return a value (last expression). Has access to LocalDate() helper.
    setVar:
      required: true
      type: string
      description: "Variable to store the script's return value"
  examples:
    concatenate:
      schema: |
        {"js": {
          "data": "'Hello, ' + '${client_name}' + '! Your number is ${caller_id_number}'",
          "setVar": "welcome_msg"
        }}
    date_format:
      schema: |
        {"js": {
          "data": "var d = LocalDate(); d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate()",
          "setVar": "today"
        }}
    conditional_value:
      schema: |
        {"js": {
          "data": "'${vip_status}' === 'true' ? 'VIP' : 'Standard'",
          "setVar": "client_tier"
        }}

# ─────────────────────────────────────────────────────────────
# UNIVERSAL — EMAIL
# ─────────────────────────────────────────────────────────────

sendEmail:
  available_in: [voice, chat, form, service]
  visual: true
  description: "Sends an email via SMTP or a configured Webitel email profile."
  args:
    to:
      required: true
      type: array
      items: string
      description: "Recipient email addresses"
    subject:
      type: string
      description: "Email subject (supports ${variables})"
    message:
      required: true
      type: string
      description: "Email body — HTML supported (supports ${variables})"
    from:
      type: string
      description: "Sender address. Defaults to SMTP auth user if omitted."
    cc:
      type: array
      items: string
      description: "CC recipients"
    replyToId:
      type: string
      description: "Message-ID to reply to (for threading). Use ${message_id} variable."
    profile:
      type: object
      description: "Webitel email profile (mutually exclusive with smtp)"
      fields:
        id:   {type: integer, description: "Profile ID"}
        name: {type: string,  description: "Profile name"}
    smtp:
      type: object
      description: "Inline SMTP config (use only if no Webitel profile)"
      fields:
        server: {type: string}
        port:   {type: integer, default: 587}
        tls:    {type: boolean, default: true}
        auth:
          type: object
          fields:
            user:     {type: string}
            password: {type: string}
    attachment:
      type: object
      fields:
        files:
          type: array
          description: "Files to attach (from ${variable} or file IDs)"
    async:
      type: boolean
      default: false
      description: "Send in background without waiting for result"
  examples:
    via_profile:
      description: "Send via Webitel email profile (recommended)"
      schema: |
        {"sendEmail": {
          "profile": {"id": "<EMAIL_PROFILE_ID>"},
          "to": ["${client_email}"],
          "subject": "Your request #${case_id}",
          "message": "Dear ${client_name},<br/>Your case has been created."
        }}
    reply_to_thread:
      description: "Reply to an existing email thread"
      schema: |
        {"sendEmail": {
          "profile": {"id": "<EMAIL_PROFILE_ID>"},
          "to": ["${from}"],
          "subject": "RE: ${subject}",
          "message": "${reply_body}",
          "replyToId": "${message_id}"
        }}

# ─────────────────────────────────────────────────────────────
# UNIVERSAL — CONTACTS (CRM)
# ─────────────────────────────────────────────────────────────

getContact:
  available_in: [voice, chat, form, service]
  visual: false
  description: "Fetches a contact by ID (etag) and stores the full contact object as JSON in a variable."
  args:
    token:
      required: true
      type: string
      description: "Webitel API access token for contacts service"
    setVar:
      required: true
      type: string
      description: "Variable to store the contact JSON"
    id:
      required: true
      type: string
      description: "Contact ID / etag (supports ${variables})"
    fields:
      type: array
      items: string
      description: "Fields to return (empty = all fields)"
  example:
    schema: |
      {"getContact": {
        "token": "<CONTACTS_TOKEN>",
        "setVar": "contact_data",
        "id": "${wbt_contact_id}",
        "fields": ["name", "phones", "emails", "variables"]
      }}

findContact:
  available_in: [voice, chat, form, service]
  visual: false
  description: "Searches contacts by phone, email, or other criteria. Stores result list as JSON."
  args:
    token:
      required: true
      type: string
      description: "Webitel API access token"
    setVar:
      required: true
      type: string
      description: "Variable to store found contacts JSON array"
    q:
      type: string
      description: "Free-text search query"
    size:
      type: integer
      default: 16
      description: "Max results to return"
    page:
      type: integer
      default: 1
    fields:
      type: array
      items: string
      description: "Fields to return in results"
  example:
    schema: |
      {"findContact": {
        "token": "<CONTACTS_TOKEN>",
        "setVar": "found_contacts",
        "q": "${caller_id_number}",
        "size": 1,
        "fields": ["id", "name", "phones"]
      }}

updateContact:
  available_in: [voice, chat, form, service]
  visual: false
  description: "Updates an existing contact's fields."
  args:
    token:
      required: true
      type: string
      description: "Webitel API access token"
    setVar:
      type: string
      description: "Variable to store updated contact JSON (optional)"
    input:
      required: true
      type: object
      description: "Contact data to update"
      fields:
        etag:
          required: true
          type: string
          description: "Contact ID to update (supports ${variables})"
        name:
          type: object
          description: "Contact name fields"
          fields:
            common_name: {type: string, description: "Display name"}
        variables:
          type: array
          description: "Custom key-value variables to set on the contact"
          items:
            type: object
            fields:
              key:   {type: string}
              value: {type: string}
    x_json_mask:
      type: array
      items: string
      description: "JSON field paths to update (partial update). Example: ['name', 'variables']"
  example:
    schema: |
      {"updateContact": {
        "token": "<CONTACTS_TOKEN>",
        "setVar": "updated_contact",
        "x_json_mask": ["variables"],
        "input": {
          "etag": "${wbt_contact_id}",
          "variables": [
            {"key": "last_call_result", "value": "${call_result}"},
            {"key": "vip", "value": "true"}
          ]
        }
      }}

# ─────────────────────────────────────────────────────────────
# UNIVERSAL — CASES (CRM)
# ─────────────────────────────────────────────────────────────

createCase:
  available_in: [voice, chat, form, service]
  visual: false
  description: "Creates a new support case in Webitel Cases module."
  args:
    token:
      required: true
      type: string
      description: "Webitel API access token for Cases service"
    setVar:
      type: string
      description: "Variable to store created case JSON (optional)"
    fields:
      type: array
      items: string
      description: "Fields to return in response (empty = default set)"
    input:
      required: true
      type: object
      description: "Case data"
      fields:
        subject:
          required: true
          type: string
          description: "Case subject / title (supports ${variables})"
        description:
          type: string
          description: "Case description (supports ${variables})"
        service:
          type: object
          description: "Service catalog item"
          fields:
            id:   {type: integer}
            name: {type: string}
        status:
          type: object
          fields:
            id:   {type: integer}
            name: {type: string, description: "Status name from lookup"}
        priority:
          type: object
          fields:
            id:   {type: integer}
            name: {type: string}
        source:
          type: object
          description: "Case source (phone, chat, email, etc.)"
          fields:
            id:   {type: integer}
            name: {type: string}
        assignee:
          type: object
          description: "Agent to assign"
          fields:
            id:   {type: integer}
            name: {type: string}
        reporter:
          type: object
          description: "Contact who reported (link to contact)"
          fields:
            id:   {type: integer}
            name: {type: string}
        contact_info:
          type: string
          description: "Free-text contact info"
  examples:
    minimal:
      schema: |
        {"createCase": {
          "token": "<CASES_TOKEN>",
          "setVar": "new_case",
          "input": {
            "subject": "Call from ${caller_id_number}",
            "source": {"name": "phone"}
          }
        }}
    full:
      schema: |
        {"createCase": {
          "token": "<CASES_TOKEN>",
          "setVar": "new_case",
          "fields": ["id", "subject", "status"],
          "input": {
            "subject": "${case_subject}",
            "description": "${case_description}",
            "service": {"id": "<SERVICE_ID>"},
            "priority": {"name": "Medium"},
            "source": {"name": "phone"},
            "contact_info": "${caller_id_number}"
          }
        }}

updateCase:
  available_in: [voice, chat, form, service]
  visual: false
  description: "Updates an existing case by etag (case ID)."
  args:
    token:
      required: true
      type: string
      description: "Webitel API access token"
    setVar:
      type: string
      description: "Variable to store updated case JSON (optional)"
    x_json_mask:
      required: true
      type: array
      items: string
      description: "JSON paths to update. Example: ['subject', 'status', 'description']"
    input:
      required: true
      type: object
      description: "Updated case data"
      fields:
        etag:
          required: true
          type: string
          description: "Case ID to update (supports ${variables})"
        subject:
          type: string
        description:
          type: string
        status:
          type: object
          fields:
            id:   {type: integer}
            name: {type: string}
        close_result:
          type: string
          description: "Required when moving case to final/closed status"
        assignee:
          type: object
          fields:
            id:   {type: integer}
            name: {type: string}
  example:
    schema: |
      {"updateCase": {
        "token": "<CASES_TOKEN>",
        "setVar": "updated_case",
        "x_json_mask": ["status", "close_result"],
        "input": {
          "etag": "${case_id}",
          "status": {"name": "Resolved"},
          "close_result": "Issue resolved during call"
        }
      }}

# ─────────────────────────────────────────────────────────────
# UNIVERSAL — NOTIFICATION & CALL
# ─────────────────────────────────────────────────────────────

notification:
  available_in: [voice, chat, form, service]
  visual: true
  description: "Sends a pop-up notification to one or more Webitel agents (operators)."
  args:
    userIds:
      required: true
      type: array
      items: integer
      description: "List of Webitel user IDs to notify"
    message:
      required: true
      type: string
      description: "Notification text (supports ${variables})"
    timeout:
      type: integer
      description: "How long to show notification in ms (0 = until dismissed)"
    type:
      type: string
      values: [info, warning, error]
      default: info
      description: "Visual type of the notification"
  example:
    schema: |
      {"notification": {
        "userIds": ["<USER_ID>"],
        "message": "VIP caller ${caller_id_number} is waiting in queue!",
        "timeout": 10000,
        "type": "warning"
      }}

makeCall:
  available_in: [voice, service]
  visual: true
  description: "Initiates an outbound call from a Webitel extension or gateway."
  args:
    from:
      required: true
      type: object
      description: "Call originator endpoint"
      fields:
        type:
          type: string
          values: [user, gateway]
        id:
          type: integer
          description: "User/gateway ID"
        extension:
          type: string
          description: "Extension number"
    destination:
      required: true
      type: string
      description: "Destination phone number to dial (supports ${variables})"
    params:
      type: object
      description: "Additional call parameters"
      fields:
        timeout:   {type: integer, description: "Ring timeout in seconds"}
        variables: {type: object,  description: "Extra channel variables"}
        record:    {type: boolean, description: "Record the call"}
    setVar:
      type: string
      description: "Variable to store the new call ID"
  examples:
    from_extension:
      schema: |
        {"makeCall": {
          "from": {"type": "user", "extension": "<AGENT_EXT>"},
          "destination": "${phone_number}",
          "setVar": "outbound_call_id"
        }}

# ─────────────────────────────────────────────────────────────
# VOICE — TTS / AUDIO
# ─────────────────────────────────────────────────────────────

tts:
  available_in: [voice]
  visual: true
  description: >
    Synthesizes text via a Webitel TTS profile and plays the audio to the call.
    Optionally waits for DTMF input (getDigits) OR speech recognition
    (getSpeech) afterwards — the two are mutually exclusive. Supports an
    optional background audio layer (ambient noise / music) during playback.
  args:
    profile:
      type: object
      description: "Webitel TTS profile to use (recommended over inline provider credentials)."
      fields:
        id:
          type: integer
          description: "TTS profile ID configured in Webitel."
    text:
      required: true
      type: string
      description: "Text to synthesize. Supports ${variables}."
    textType:
      type: string
      values: [text, ssml]
      description: "Input format: plain text or SSML. Provider-dependent."
    language:
      type: string
      description: "Language/locale code (e.g. 'en-US', 'uk-UA'). Provider-dependent."
    voice:
      type: string
      description: "Voice name (provider-specific, e.g. 'en-US-Neural2-F', 'uk-UA-OstapNeural')."
    voice_settings:
      type: object
      description: "Free-form provider-specific voice parameters (key → value)."
    format:
      type: string
      values: [mp3, wav, ulaw]
      description: "Output audio format."
    static:
      type: boolean
      default: false
      description: "Cache the synthesized audio for reuse (static prompt)."
    speakingRate:
      type: string
      description: "Google-specific: speaking rate (e.g. '1.0', '1.2')."
    pitch:
      type: string
      description: "Google-specific: pitch adjustment (e.g. '-2', '+2')."
    volumeGainDb:
      type: string
      description: "Google-specific: volume gain in dB (e.g. '0', '+6')."
    effectsProfileId:
      type: string
      description: "Google-specific: audio effects profile ID (e.g. 'telephony-class-application')."
    background:
      type: object
      description: "Play an audio layer BEHIND the synthesized speech (ambient noise / music bed) (Microsoft)."
      fields:
        url:
          type: string
          description: "Background audio URL (played during TTS)."
        volume:
          type: number
          description: "Background volume (0.0 - 1.0)."
        fadeIn:
          type: integer
          description: "Fade-in duration in milliseconds."
        fadeOut:
          type: integer
          description: "Fade-out duration in milliseconds."
    terminator:
      type: string
      description: "Single DTMF digit that terminates playback if pressed (e.g. '#')."
    getDigits:
      type: object
      description: >
        Wait for DTMF input after (or during) TTS playback. Mutually exclusive
        with 'getSpeech'.
      fields:
        setVar:
          type: string
          required: true
          description: "Session variable to store collected digits."
        min:
          type: integer
          default: 1
          description: "Minimum number of digits required."
        max:
          type: integer
          description: "Maximum number of digits accepted."
        tries:
          type: integer
          description: "How many collection attempts to make on invalid/timeout input."
        timeout:
          type: integer
          description: "Inter-digit timeout in milliseconds (time waited for the first digit)."
        digitTimeout:
          type: integer
          description: "Per-digit timeout in milliseconds (time between digits)."
        flushDTMF:
          type: boolean
          default: false
          description: "Flush any buffered DTMF before starting collection."
        regexp:
          type: string
          description: "Regex the collected digits must match (e.g. '^[1-9]$')."
        terminators:
          type: string
          description: "Characters that end digit collection (e.g. '#*')."
    getSpeech:
      type: object
      description: >
        Speech recognition (STT) block that runs with/after TTS playback.
        Mutually exclusive with 'getDigits'. Captures recognized text into a
        session variable.
      fields:
        setVar:
          type: string
          description: "Session variable to store the recognized transcript."
        timeout:
          type: integer
          description: >
            Overall STT timeout in milliseconds. If no isFinal arrives from the
            recognizer within this window, the block exits.
        vadTimeout:
          type: integer
          description: >
            Voice-activity-detection silence timeout in milliseconds. If the
            caller is silent for this long, the block exits with
            is_final=true and an empty transcript.
        disableBreakFinal:
          type: boolean
          default: false
          description: >
            If true, do NOT interrupt playback on an isFinal from STT — keep
            playing the TTS to completion.
        breakFinalOnTimeout:
          type: boolean
          default: false
          description: >
            Used together with disableBreakFinal=true: after playback finishes,
            wait 'timeout' ms for speech; if speech is detected, break out of
            silence waiting.
        minWords:
          type: integer
          description: "Minimum number of recognized words required for a valid result."
        maxWords:
          type: integer
          description: "Maximum number of recognized words (early-cutoff hint)."
        breakStability:
          type: number
          description: "Interim-result stability threshold that triggers early break (0.0 - 1.0)."
        question:
          type: string
          description: "Question label / tag stored with the recognition event for analytics."
        profile:
          type: object
          description: "V3: STT profile to use."
          fields:
            id:
              type: integer
        version:
          type: string
          values: [v1, v2, v3]
          description: "Recognizer engine version. Default: v1."
        lang:
          type: string
          description: "V2/V3: primary recognition language (e.g. 'uk-UA')."
        alternativeLang:
          type: array
          items: string
          description: "V2/V3: additional candidate languages."
        model:
          type: string
          description: "V2: recognition model name."
        uri:
          type: string
          description: "V2: custom recognizer URI."
        recognizer:
          type: string
          description: "V2: recognizer resource name."
        interim:
          type: boolean
          description: "V2: emit interim results."
        singleUtterance:
          type: boolean
          description: "V2: stop after the first utterance."
        separateRecognition:
          type: boolean
          description: "V2: separate recognition per channel."
        maxAlternatives:
          type: integer
          description: "V2: max number of alternative transcripts returned."
        profanityFilter:
          type: boolean
          description: "V2: mask profanity in the transcript."
        wordTime:
          type: boolean
          description: "V2: include word-level timestamps."
        punctuation:
          type: boolean
          description: "V2: add automatic punctuation."
        enhanced:
          type: boolean
          description: "V2: use enhanced model if available."
        hints:
          type: string
          description: "V2: phrase hints to boost recognition (comma-separated)."
        sampleRate:
          type: integer
          description: "V2: input sample rate in Hz."
        extraParams:
          type: object
          description: "V3: free-form extra recognizer parameters (string → string)."
        background:
          type: object
          description: "Play a file while listening (e.g. a prompt or ambient bed). Separate from TTSSettings.background."
          fields:
            name:
              type: string
            file:
              type: object
              description: "PlaybackFile reference for the background prompt."
            volume_reduction:
              type: integer
              description: "Volume reduction applied to the background file while listening."
  examples:
    simple:
      description: "Just speak a line"
      schema: |
        {"tts": {
          "profile":  {"id": 3},
          "text":     "Hello ${client_name}, your queue position is ${cc_position}.",
          "language": "en-US"
        }}
    ssml_with_voice:
      description: "SSML input with a specific voice and format"
      schema: |
        {"tts": {
          "profile":  {"id": 3},
          "textType": "ssml",
          "text":     "<speak>Please wait. <break time='500ms'/> Connecting you now.</speak>",
          "language": "en-US",
          "voice":    "en-US-Neural2-F",
          "format":   "wav",
          "static":   true
        }}
    google_prosody:
      description: "Google-specific speaking rate / pitch / volume"
      schema: |
        {"tts": {
          "profile":          {"id": 3},
          "text":             "Дякуємо за ваше терпіння.",
          "language":         "uk-UA",
          "speakingRate":     "0.95",
          "pitch":            "-1",
          "volumeGainDb":     "+2",
          "effectsProfileId": "telephony-class-application"
        }}
    background_ambience:
      description: "Speak with a low-volume background bed and fades"
      schema: |
        {"tts": {
          "profile":  {"id": 3},
          "text":     "All operators are currently busy. Please stay on the line.",
          "language": "en-US",
          "background": {
            "url":     "https://media.example.com/beds/hold.mp3",
            "volume":  0.25,
            "fadeIn":  500,
            "fadeOut": 800
          }
        }}
    ivr_menu_digits:
      description: "TTS menu with DTMF collection"
      schema: |
        {"tts": {
          "profile":  {"id": 3},
          "text":     "Press 1 for support. Press 2 for sales.",
          "language": "en-US",
          "terminator": "#",
          "getDigits": {
            "setVar":    "ivr_choice",
            "min":       1,
            "max":       1,
            "tries":     3,
            "timeout":   5000,
            "regexp":    "^[1-2]$",
            "flushDTMF": true
          }
        }}
    collect_account_number:
      description: "Collect a 6-10 digit account number ending with '#'"
      schema: |
        {"tts": {
          "profile":  {"id": 3},
          "text":     "Please enter your account number, then press pound.",
          "language": "en-US",
          "getDigits": {
            "setVar":       "account_no",
            "min":          6,
            "max":          10,
            "timeout":      7000,
            "digitTimeout": 3000,
            "terminators":  "#"
          }
        }}
    speech_recognition:
      description: "TTS prompt with speech capture via STT v2"
      schema: |
        {"tts": {
          "profile":  {"id": 3},
          "text":     "How may I help you today?",
          "language": "en-US",
          "getSpeech": {
            "setVar":     "user_intent",
            "timeout":    8000,
            "vadTimeout": 1500,
            "version":    "v2",
            "lang":       "en-US",
            "interim":    true,
            "singleUtterance": true,
            "punctuation":     true
          }
        }}
    speech_v3_with_profile:
      description: "Use a Webitel STT v3 profile with extra params"
      schema: |
        {"tts": {
          "profile":  {"id": 3},
          "text":     "Будь ласка, вкажіть причину звернення.",
          "language": "uk-UA",
          "getSpeech": {
            "setVar":     "user_reason",
            "timeout":    10000,
            "vadTimeout": 1200,
            "version":    "v3",
            "profile":    {"id": 7},
            "extraParams": {
              "boost":  "high"
            }
          }
        }}
    speech_dont_interrupt_playback:
      description: "Finish the prompt fully, then accept speech briefly"
      schema: |
        {"tts": {
          "profile":  {"id": 3},
          "text":     "After the tone, please say your full name and date of birth.",
          "language": "en-US",
          "getSpeech": {
            "setVar":              "identity",
            "timeout":             6000,
            "vadTimeout":          1500,
            "disableBreakFinal":   true,
            "breakFinalOnTimeout": true,
            "version":             "v2",
            "lang":                "en-US"
          }
        }}
    speech_with_background_file:
      description: "Play a hold file while listening (STT-side background)"
      schema: |
        {"tts": {
          "profile":  {"id": 3},
          "text":     "Please describe your issue.",
          "language": "en-US",
          "getSpeech": {
            "setVar":     "issue",
            "timeout":    10000,
            "vadTimeout": 2000,
            "version":    "v2",
            "lang":       "en-US",
            "background": {
              "name":             "soft_hold",
              "file":             {"id": "${hold_file_id}"},
              "volume_reduction": 30
            }
          }
        }}
  notes:
    - "'getDigits' and 'getSpeech' are mutually exclusive — set at most one."
    - "The top-level 'background' plays AUDIO BEHIND the synthesized speech (ambient noise / music bed). It is different from 'getSpeech.background', which plays a file while the STT block is listening."
    - "'static: true' caches the synthesized audio so the same text+voice reuses cached media — use for fixed prompts, not for prompts containing dynamic ${variables}."
    - "Inline provider credentials (key, token, provider, region, keyLocation) are DEPRECATED — configure a 'profile' in Webitel and reference it via profile.id."
    - "'textType' accepts 'text' or 'ssml' (provider-dependent); SSML gives you <break>, <prosody>, <say-as>, etc."
    - "Google-specific knobs (speakingRate, pitch, volumeGainDb, effectsProfileId) are ignored by non-Google providers."
    - "getDigits.timeout is the first-digit timeout; getDigits.digitTimeout is the inter-digit timeout. Both are in milliseconds."
    - "getSpeech.timeout = overall STT wait; getSpeech.vadTimeout = silence-to-exit threshold (in ms). Short vadTimeout makes the block snappy but can cut words."
    - "getSpeech.version selects the recognizer: v1 (default), v2 (richer controls: model/uri/recognizer/interim/hints/…), v3 (profile-based with extraParams)."
    - "disableBreakFinal + breakFinalOnTimeout combo: first finish the TTS file, then (within 'timeout') still break out if speech arrives. Useful for 'let the prompt finish, then immediately listen' UX."

recordFile:
  available_in: [voice]
  visual: true
  description: "Records a voice message from the caller into a file (voicemail / recording prompt)."
  args:
    name:
      type: string
      default: "recordFile_${strepoch()}"
      description: "Recording file name (supports ${variables})"
    type:
      type: string
      values: [mp3, wav]
      default: mp3
    maxSec:
      type: integer
      default: 60
      description: "Maximum recording duration in seconds"
    silenceThresh:
      type: integer
      default: 200
      description: "Silence detection threshold"
    silenceHits:
      type: integer
      default: 5
      description: "Number of consecutive silence hits before stopping"
    terminators:
      type: string
      description: "DTMF key to stop recording (e.g. '#')"
    voiceMail:
      type: boolean
      default: false
      description: "Tag recording as voicemail"
  examples:
    voicemail:
      schema: |
        {"recordFile": {
          "name": "voicemail_${caller_id_number}_${strepoch()}",
          "type": "mp3",
          "maxSec": 120,
          "terminators": "#",
          "voiceMail": true
        }}
    short_prompt:
      schema: |
        {"recordFile": {
          "name": "prompt_${uuid}",
          "type": "wav",
          "maxSec": 30,
          "silenceHits": 3
        }}

say:
  available_in: [voice]
  visual: false
  description: "Plays a short system-synthesized phrase using FreeSWITCH's native say engine. Useful for simple numbers, dates, currency without a TTS profile."
  args:
    type: string
    description: "Text or value to say (numbers, dates, etc.)"
  example:
    schema: |
      {"say": "Your queue position is ${cc_position}"}
  notes:
    - "Uses FreeSWITCH built-in TTS — quality is basic"
    - "Prefer tts app when a TTS profile is available"
    - "Good for dynamic numbers when TTS profile is not configured"

ringback:
  available_in: [voice]
  visual: true
  description: "Sets custom ringback/hold music tones for the current call leg."
  args:
    call:
      type: object
      description: "Ringback tone played to caller while ringing"
      fields:
        type: {type: string, values: [mp3, wav, ogg]}
        id:   {type: integer, description: "File ID in Webitel media"}
        name: {type: string}
    hold:
      type: object
      description: "Music played when call is on hold"
      fields:
        type: {type: string}
        id:   {type: integer}
        name: {type: string}
    transfer:
      type: object
      description: "Music played during transfer"
      fields:
        type: {type: string}
        id:   {type: integer}
        name: {type: string}
    all:
      type: boolean
      default: false
      description: "Apply same file to all three legs"
  examples:
    hold_music:
      description: "Set hold music only"
      schema: |
        {"ringback": {
          "hold": {"id": "<HOLD_MUSIC_FILE_ID>"}
        }}
    all_same:
      description: "Same audio for all legs"
      schema: |
        {"ringback": {
          "all": true,
          "call": {"id": "<MUSIC_FILE_ID>"}
        }}

# ─────────────────────────────────────────────────────────────
# META — TAG & BREAK
# These are fields on any app object, not standalone apps.
# ─────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────
# INFRASTRUCTURE APPS  (function / execute / trigger)
# ─────────────────────────────────────────────────────────────

function:
  available_in: [voice, chat, form, service]
  visual: true
  description: |
    Defines a named reusable sub-flow (module). Must appear at the beginning of the schema
    (before answer/start). The function is NOT executed inline — it is a declaration.
    Call it with `execute`.
  args:
    name:
      required: true
      type: string
      description: "Unique name for this function. Used as the target of execute calls."
    actions:
      required: true
      type: array
      description: "Array of schema steps that make up the function body."
  example:
    schema: |
      {"function": {
        "name": "join-support-queue",
        "actions": [
          {"joinQueue": {"queue": {"id": "<QUEUE_ID>", "name": "<QUEUE_NAME>"}, "timers": [], "bucket": {}}},
          {"playback": {"files": [{"id": "<BUSY_FILE_ID>", "name": "busy.wav"}]}},
          {"hangup": ""}
        ]
      }}
  notes:
    - "function blocks appear at schema root level BEFORE answer/start."
    - "Multiple function blocks are allowed (each with a unique name)."
    - "Function actions can reference other execute calls (nested reuse)."

execute:
  available_in: [voice, chat, form, service]
  visual: true
  description: |
    Calls a named function defined by a `function` block in the same schema.
    Execution jumps into the function body and returns when complete (async: false)
    or continues immediately (async: true).
    The function name can be a human-readable string (e.g. "join-support-queue")
    or a UUID string (customModule UUID assigned by the visual editor).
  args:
    name:
      required: true
      type: string
      description: "Name of the function to call. Can be a plain name or a UUID (customModule)."
    async:
      type: boolean
      default: false
      description: "If true, start the function in background and continue without waiting."
  examples:
    sync:
      description: "Call a named function synchronously"
      schema: |
        {"execute": {"name": "join-support-queue", "async": false}}
    async_uuid:
      description: "Call a customModule UUID asynchronously (as generated by visual editor)"
      schema: |
        {"execute": {"async": true, "name": "silence_masking"}}
  notes:
    - "The most common use is async: false (wait for function to finish)."
    - "In the visual editor, execute nodes appear as 'customModule' label with a UUID tag."
    - "Use async: true for background tasks like playing masking audio or sending notifications."

trigger:
  available_in: [voice, chat, service]
  visual: true
  description: |
    Registers event handler steps — does NOT execute anything immediately.
    Like `function`, trigger is a setup step parsed before the flow runs.
    Handlers fire at specific lifecycle events:

    - `disconnected` — steps run AFTER the entire flow ends and the call/chat disconnects.
      Runs synchronously in a separate context (deadline: 60s for voice, 10s for chat).
      Use for CRM updates, logging, exports — this is the standard post-call cleanup pattern.

    - `commands` (chat only) — map of command_name → steps.
      During `recvMessage`, if the received message text exactly matches a command name,
      the corresponding steps fire asynchronously and `recvMessage` is called again
      (the matching message is consumed, not stored in setVar).
      Use for in-chat bot commands (e.g. "/stop", "/help") that interrupt the normal dialog.
  args:
    disconnected:
      type: array
      description: "Steps to run after the flow ends and the call/chat disconnects. Standard post-call pattern."
    commands:
      type: object
      description: "Chat only. Map of command_name → steps array. Fires async when recvMessage receives an exact match."
  notes:
    - "trigger is NOT executed in-place — it only registers handlers. Place it at the top of the schema (before answer/start)."
    - "disconnected steps run with a fresh context after the main flow — they can use export, httpRequest, set, etc."
    - "commands handler consumes the matching message; recvMessage loops and waits for the next message."
    - "There is NO fire-and-forget mode in trigger. For async sub-flow invocation use schema{async:true} or execute{async:true}."
  examples:
    disconnected_crm:
      description: "Post-call CRM update and variable export on disconnect"
      schema: |
        {"trigger": {
          "disconnected": [
            {"export": ["result", "transcript"]},
            {"httpRequest": {
              "method": "POST", "url": "<CRM_URL>",
              "data": {"call_id": "${uuid}", "result": "${result}"},
              "timeout": 5000
            }}
          ]
        }}
    commands_chat:
      description: "Chat command handler — /stop ends the bot session"
      schema: |
        {"trigger": {
          "commands": {
            "/stop": [
              {"sendText": "Session ended. Goodbye!"},
              {"set": {"result": "user_stopped"}},
              {"hangup": ""}
            ]
          }
        }}

# ─────────────────────────────────────────────────────────────
# VOICE ROUTING APPS  (joinAgent, lastBridged, park, conference, etc.)
# ─────────────────────────────────────────────────────────────

joinAgent:
  available_in: [voice]
  visual: true
  description: "Routes an inbound call directly to a specific agent, bypassing the queue. Unlike joinQueue, the agent is called immediately without queue priority/distribution logic."
  args:
    agent:
      required: true
      type: object
      fields:
        extension:
          type: string
          description: "Agent extension (supports ${variables})"
    ringtone:
      type: object
      description: "Hold music during ringing. {id, name}"
    cancelDistribute:
      type: boolean
      default: false
      description: "If true, remove this call from any queue distribution while waiting."
    processing:
      type: object
      description: "Post-call processing options."
      fields:
        enabled: {type: boolean}
    queueName:
      type: string
      description: "Optional queue name for reporting/logging."
    bridged:
      type: array
      description: "Steps to run after bridge is established (e.g. hangup, logging)."
  outputs:
    out: "Fallback — agent did not answer or rejected"
    bridged: "Agent answered — executes bridged[] sub-flow"
  example:
    schema: |
      {"joinAgent": {
        "agent": {"extension": "${my_ext}"},
        "ringtone": {"id": "<MOH_FILE_ID>"},
        "cancelDistribute": false,
        "processing": {"enabled": false},
        "bridged": [{"hangup": ""}]
      }}
  notes:
    - "Always handle the 'out' (fallback) path — agent may not answer."
    - "bridged[] runs inline: put hangup or post-call steps there."
    - "Combine with lastBridged to route to the caller's last agent."

lastBridged:
  available_in: [voice]
  visual: false
  description: |
    Looks up the last bridged call for a given phone number within N hours.
    Stores agent info (agent_id, extension, queue_id) into variables.
    Rendered in the visual editor as a 'customCode' node with a JSON code block.
  args:
    number:
      required: true
      type: string
      description: "Phone number to look up (usually ${caller_id_number})."
    hours:
      type: integer
      default: 24
      description: "Look-back window in hours."
    calls:
      type: object
      description: "Which call directions to consider."
      fields:
        inbound: {type: string, values: [all, none], default: all}
        outbound: {type: string, values: [all, none], default: all}
    set:
      type: object
      description: "Map of variable name → agent field to extract. Keys are output variable names, values are agent field names (agent_id, extension, queue_id)."
  example:
    schema: |
      {"lastBridged": {
        "number": "${caller_id_number}",
        "hours": 24,
        "calls": {"inbound": "all", "outbound": "all"},
        "set": {
          "my_agent_id": "agent_id",
          "my_ext":      "extension",
          "my_queue_id": "queue_id"
        }
      }}
  notes:
    - "If no match found, the set variables remain empty — check with if !${my_ext}."
    - "Use export after lastBridged to make variables visible in supervisor screen."

updateCid:
  available_in: [voice]
  visual: true
  description: "Overrides the caller ID name or number displayed on the agent's phone and in Webitel supervisor. Does not change the number, only the name field."
  args:
    name:
      type: string
      description: "New caller name to display (supports ${variables})"
    number:
      type: string
      description: "New caller number to display (supports ${variables})"
  example:
    schema: |
      {"updateCid": {"name": "${contacts_list.data.0.name.common_name}"}}

park:
  available_in: [voice]
  visual: true
  description: "Parks the current call in a parking lot. The call waits until retrieved by another extension."
  args:
    lot:
      type: string
      description: "Parking lot name or number."
    timeout:
      type: integer
      description: "Seconds before returning the parked call to the parking flow."
  example:
    schema: |
      {"park": {"lot": "default", "timeout": 60}}

sipRedirect:
  available_in: [voice]
  visual: true
  description: "Sends a SIP 302 redirect response to the caller, redirecting the call to another SIP URI without bridging through Webitel."
  args:
    uri:
      required: true
      type: string
      description: "Target SIP URI to redirect to."
  example:
    schema: |
      {"sipRedirect": {"uri": "sip:backup@<SIP_HOST>"}}

conference:
  available_in: [voice]
  visual: true
  description: "Joins the current call into a named FreeSWITCH conference room. Calls sharing the same name + profile (within the same domain) land in the same room."
  args:
    name:
      type: string
      default: "global"
      description: "Conference room name. The room key is composed as '<name>_<domainId>@<profile>', so the same name across calls within one domain/profile routes them into the same room."
    profile:
      type: string
      default: "default"
      description: "FreeSWITCH conference profile applied to the room (controls codec, announcements, recording, moderator behavior, etc.). Must exist in your FS conference config."
    pin:
      type: string
      description: "Optional PIN required to enter the room. Appended to the dial string as '+<pin>'."
    tags:
      type: array
      items: string
      description: >
        Optional FreeSWITCH conference flags applied to this participant on join.
        Items are joined with '|' and passed as 'flags{...}'.
        Common values: 'mute', 'deaf', 'vmute', 'moderator', 'endconf', 'mintwo',
        'waste', 'nomoh', 'ghost', 'join-only', 'wait-mod'.
  examples:
    basic:
      schema: |
        {"conference": {"name": "team-meeting-${uuid}"}}
    with_pin_and_profile:
      schema: |
        {"conference": {"name": "sales-daily", "profile": "recorded", "pin": "1234"}}
    moderator_endconf:
      schema: |
        {"conference": {"name": "all-hands", "tags": ["moderator", "endconf"]}}
    join_muted_and_deaf:
      schema: |
        {"conference": {"name": "listen-only-room", "tags": ["mute", "deaf"]}}

flushDTMF:
  available_in: [voice]
  visual: true
  description: "Clears any buffered DTMF digits received so far. Use before a new input prompt to prevent stale key presses from being read."
  args: {}
  example:
    schema: |
      {"flushDTMF": {}}

inBandDTMF:
  available_in: [voice]
  visual: true
  description: >
    Starts or stops in-band DTMF detection on the current call — i.e. detection
    of DTMF as audio tones inside the media stream, as opposed to RFC 2833
    or SIP INFO signaling. Use when the carrier delivers DTMF in-band.
  args:
    value:
      type: string
      values: [start, stop]
      default: start
      description: >
        Scalar string argument (not an object). Pass 'stop' to disable in-band
        DTMF detection on the call. Any other value — including 'start', omitted,
        or an empty string — enables detection.
  examples:
    start:
      schema: |
        {"inBandDTMF": "start"}
    stop:
      schema: |
        {"inBandDTMF": "stop"}

markIVR:
  available_in: [voice]
  visual: true
  description: "Records the current IVR menu selection for reporting purposes. Marks which IVR path was taken for analytics."
  args:
    name:
      type: string
      description: "IVR menu name for the report."
    digit:
      type: string
      description: "Digit/choice pressed by the caller (supports ${variables})."
  example:
    schema: |
      {"markIVR": {"name": "main-menu", "digit": "${ivr_choice}"}}


# ─────────────────────────────────────────────────────────────
# CRM / CONTACT APPS
# ─────────────────────────────────────────────────────────────

userInfo:
  available_in: [voice, chat, form, service]
  visual: true
  description: |
    Retrieves agent/user profile data from Webitel by extension or user ID.
    Maps selected user fields to session variables. Commonly used to find
    which team an agent belongs to after lastBridged.
  args:
    user:
      required: true
      type: object
      description: "Lookup key — provide either extension or id."
      fields:
        extension:
          type: string
          description: "Agent extension to look up (supports ${variables})"
        id:
          type: string
          description: "Webitel user ID to look up (supports ${variables})"
    set:
      required: true
      type: object
      description: "Map of output variable → user field name. Keys become session variables, values are user profile fields (e.g. 'extension', 'email', 'name', 'team_id', 'id')."
  example:
    basic:
      description: "Get team ID for the last bridged agent"
      schema: |
        {"userInfo": {
          "user": {"extension": "${my_ext}"},
          "set": {"agent_team": "team_id"}
        }}
    by_id:
      description: "Get owner extension and email by user ID from CRM result"
      schema: |
        {"userInfo": {
          "user": {"id": "${contacts_list.data.0.managers.data.0.user.id}"},
          "set": {
            "OwnerNumber": "extension",
            "ownerEmail":  "email"
          }
        }}
  notes:
    - "set uses dict format: {outputVar: userField}. LLM must NOT use array format here."
    - "Available user fields: id, extension, email, name, team_id, team_name, status."

memberInfo:
  available_in: [voice, service]
  visual: true
  description: "Retrieves outbound campaign member data (dialer contact info) into variables. Use in dialer flows to access the contact's fields from the campaign list."
  args:
    set:
      required: true
      type: object
      description: "Map of variable name → member field to extract."
  example:
    schema: |
      {"memberInfo": {
        "set": {
          "client_name":  "name",
          "client_phone": "destination",
          "member_id":    "id"
        }
      }}

callbackQueue:
  available_in: [voice, chat, form, service]
  visual: true
  description: >
    Adds the caller to a callback queue so an agent can call them back later
    instead of waiting on hold. Returns immediately after enqueueing.
  args:
    queue:
      required: true
      type: object
      description: "Target callback queue as SearchEntity {id, name}. Either 'queue' must be provided."
      fields:
        id:
          type: integer
          required: true
        name:
          type: string
    holdSec:
      type: integer
      description: "Hold delay in seconds before the callback entry becomes eligible for dialing."
    name:
      type: string
      description: "Display name of the callback member (usually the caller's name)."
    priority:
      type: integer
      default: 0
      description: "Priority of the entry inside the queue. Higher = dialed earlier."
    variables:
      type: object
      description: "Extra key-value variables attached to the callback attempt (string → string)."
    communication:
      type: object
      description: "Communication endpoint used for the callback (phone number, etc.)."
      fields:
        destination:
          type: string
          required: true
          description: "Phone number / address to call back (supports ${variables})."
        description:
          type: string
          description: "Free-text note on this communication."
        type:
          type: object
          description: "Communication type as SearchEntity {id, name} (e.g. phone, mobile)."
        resource_id:
          type: integer
          description: "Outbound resource (gateway/trunk) ID used when dialing."
        display:
          type: string
          description: "Caller-ID / display number presented on the outbound call."
        priority:
          type: integer
          description: "Priority of this particular communication when the member has several."
    timezone:
      type: object
      description: "Timezone of the callback member."
      fields:
        id:
          type: integer
    bucket:
      type: object
      description: "Bucket assigned to the callback entry (for bucket-based routing)."
      fields:
        id:
          type: integer
    agent:
      type: object
      description: "Preferred agent to handle the callback (sticky agent)."
      fields:
        id:
          type: integer
    expire_at:
      type: integer
      description: "Unix ms timestamp after which this callback entry expires and will no longer be dialed."
    stop_cause:
      type: string
      description: "Optional stop cause marker (used when pre-terminating an entry)."
  examples:
    minimal:
      description: "Drop the caller into a callback queue by queue id"
      schema: |
        {"callbackQueue": {
          "queue": {"id": 42},
          "communication": {"destination": "${caller_id_number}"}
        }}
    with_variables_and_priority:
      description: "Add context variables, custom caller-ID and raise priority"
      schema: |
        {"callbackQueue": {
          "queue": {"id": 42},
          "priority": 10,
          "name": "${caller_id_name}",
          "communication": {
            "destination": "${caller_id_number}",
            "type": {"id": 1, "name": "phone"},
            "display": "+380443332211"
          },
          "variables": {
            "source": "ivr",
            "ivr_branch": "sales",
            "ref_id": "${uuid}"
          }
        }}
    scheduled_with_expire:
      description: "Hold for 60s, expire the entry at a given unix-ms timestamp"
      schema: |
        {"callbackQueue": {
          "queue_id": 42,
          "holdSec": 60,
          "communication": {"destination": "${caller_id_number}"},
          "expire_at": 1745251200000,
          "timezone": {"id": 1},
          "bucket": {"id": 5}
        }}
    sticky_agent:
      description: "Route the callback to a specific agent with high priority"
      schema: |
        {"callbackQueue": {
          "queue": {"id": 42},
          "communication": {"destination": "${caller_id_number}"},
          "agent": {"id": 17},
          "priority": 100
        }}
    from_crm_lookup:
      description: "Callback for a lead enriched from CRM lookup"
      schema: |
        {"callbackQueue": {
          "queue": {"id": 42},
          "name": "${contact_name}",
          "communication": {
            "destination": "${contact_phone}",
            "resource_id": 7,
            "display": "+380443332211"
          },
          "variables": {
            "contact_id": "${contact_id}",
            "campaign": "spring_promo"
          }
        }}
    preterminate:
      description: "Insert an entry already marked with a stop cause (e.g. for audit)"
      schema: |
        {"callbackQueue": {
          "queue_id": 42,
          "communication": {"destination": "${caller_id_number}"},
          "stop_cause": "NO_ANSWER"
        }}

getEmail:
  available_in: [voice, chat, form, service]
  visual: true
  description: >
    Fetches an email message (from call_center.cc_email) by its internal id or
    RFC Message-ID and maps selected fields into session variables. Lookup is
    scoped to the current domain; only emails whose profile belongs to the
    domain are returned. If multiple rows match, the most recently created one
    is used.
  args:
    email:
      required: true
      type: object
      description: "Email message lookup. Provide 'id' (internal email id) or 'messageId' (RFC Message-ID)."
      fields:
        id:
          type: integer
          description: "Internal cc_email.id (int64). Supports ${variables}."
        messageId:
          type: string
          description: "RFC Message-ID header value. Supports ${variables}."
    set:
      required: true
      type: object
      description: "Map of output variable → email field. Keys become session variables, values must be one of the allowed email fields below."
      available_fields:
        id:
          type: string
          description: "Internal email id (as text)."
        message_id:
          type: string
          description: "RFC Message-ID header."
        from:
          type: string
          description: "Comma-joined list of 'From' addresses."
        to:
          type: string
          description: "Comma-joined list of 'To' addresses."
        cc:
          type: string
          description: "Comma-joined list of 'Cc' addresses."
        sender:
          type: string
          description: "Comma-joined list of 'Sender' addresses."
        reply_to:
          type: string
          description: "Comma-joined list of 'Reply-To' addresses."
        in_reply_to:
          type: string
          description: "Value of the 'In-Reply-To' header."
        subject:
          type: string
          description: "Email subject."
        body:
          type: string
          description: "Plain-text body."
        html:
          type: string
          description: "HTML body. When selected, an extra variable (the mail CID key) is also populated with the email's cid."
        attachments:
          type: string
          description: "JSON array (as text) of up to 40 attachments: [{id, name, size, mime}]."
        contact_ids:
          type: string
          description: "JSON array (as text) of linked contact IDs."
        owner_id:
          type: string
          description: "Owner user ID (as text)."
  examples:
    by_id:
      description: "Fetch subject and from by internal id"
      schema: |
        {"getEmail": {
          "email": {"id": "${email_id}"},
          "set": {
            "mail_subject": "subject",
            "mail_from":    "from"
          }
        }}
    by_message_id:
      description: "Fetch by RFC Message-ID"
      schema: |
        {"getEmail": {
          "email": {"messageId": "${message_id}"},
          "set": {
            "mail_to":      "to",
            "mail_cc":      "cc",
            "mail_subject": "subject"
          }
        }}
    full_message:
      description: "Pull the whole message (plain + html + attachments)"
      schema: |
        {"getEmail": {
          "email": {"id": "${email_id}"},
          "set": {
            "mail_id":          "id",
            "mail_message_id":  "message_id",
            "mail_from":        "from",
            "mail_to":          "to",
            "mail_cc":          "cc",
            "mail_reply_to":    "reply_to",
            "mail_in_reply_to": "in_reply_to",
            "mail_subject":     "subject",
            "mail_body":        "body",
            "mail_html":        "html",
            "mail_attachments": "attachments",
            "mail_contacts":    "contact_ids",
            "mail_owner":       "owner_id"
          }
        }}
    reply_context:
      description: "Prepare variables for composing a reply"
      schema: |
        {"getEmail": {
          "email": {"messageId": "${incoming_message_id}"},
          "set": {
            "reply_to_addr":   "reply_to",
            "orig_from":       "from",
            "orig_subject":    "subject",
            "orig_message_id": "message_id"
          }
        }}
  notes:
    - "set uses dict format: {outputVar: emailField}. Array form is not accepted."
    - "Exactly one of email.id or email.messageId is required; if both are provided the DB matches either via OR."
    - "Unknown field names in 'set' are silently ignored (only the whitelisted fields are projected)."
    - "Selecting 'html' additionally stores the message cid under the MailCidKey session variable."
    - "attachments and contact_ids are returned as JSON strings — parse them downstream if you need structured access."

getQueueAgents:
  available_in: [voice, chat, form, service]
  visual: true
  description: >
    Returns counts of agents assigned to a queue (via its skills) broken down by
    agent status and channel state. Only agents whose skill capacity matches the
    queue-skill's min/max range and — if the queue has a team — whose team
    matches the queue's team are counted.
  args:
    queue:
      required: true
      type: object
      description: "Queue to inspect as SearchEntity. Provide 'id' (and optionally 'name' for readability)."
      fields:
        id:
          type: integer
          required: true
          description: "Queue ID. Supports ${variables}."
        name:
          type: string
          description: "Queue name (not used for lookup — id is the key)."
    channel:
      type: string
      description: >
        Channel to evaluate the 'waiting' state against (e.g. 'call', 'chat', 'email').
        Joined to cc_agent_channel on agent_id + channel. Required for the 'waiting'
        field to be meaningful; other counters are channel-independent.
    set:
      required: true
      type: object
      description: >
        Map of output variable → metric. Keys become session variables; values must
        be one of the allowed metrics below. At least one valid entry is required,
        otherwise the call fails with a 400 'bad request'.
      available_fields:
        count:
          type: string
          description: "Total distinct agents assigned to the queue (via enabled skill links)."
        online:
          type: string
          description: "Agents with status = 'online'."
        offline:
          type: string
          description: "Agents with status = 'offline'."
        pause:
          type: string
          description: "Agents with status = 'pause'."
        waiting:
          type: string
          description: >
            Agents with status = 'online' whose cc_agent_channel.state = 'waiting' on
            the provided channel. Returns 0 if 'channel' is not specified.
  examples:
    basic_count:
      description: "How many agents are assigned to the queue"
      schema: |
        {"getQueueAgents": {
          "queue": {"id": 42},
          "set": {"agents_total": "count"}
        }}
    online_waiting_for_calls:
      description: "Online vs. actually waiting-for-a-call agents"
      schema: |
        {"getQueueAgents": {
          "queue": {"id": 42},
          "channel": "call",
          "set": {
            "agents_online":  "online",
            "agents_waiting": "waiting"
          }
        }}
    full_breakdown:
      description: "Full status breakdown for a chat queue"
      schema: |
        {"getQueueAgents": {
          "queue": {"id": "${target_queue_id}"},
          "channel": "chat",
          "set": {
            "q_total":   "count",
            "q_online":  "online",
            "q_offline": "offline",
            "q_pause":   "pause",
            "q_waiting": "waiting"
          }
        }}
    skip_ivr_if_no_agents:
      description: "Guard IVR routing — skip the queue if nobody is online"
      schema: |
        {"getQueueAgents": {
          "queue": {"id": 42},
          "channel": "call",
          "set": {
            "sales_online":  "online",
            "sales_waiting": "waiting"
          }
        }}
    overflow_decision:
      description: "Decide overflow by comparing waiting agents vs queue.waiting downstream"
      schema: |
        {"getQueueAgents": {
          "queue": {"id": "${primary_queue_id}"},
          "channel": "call",
          "set": {
            "primary_waiting_agents": "waiting",
            "primary_online_agents":  "online"
          }
        }}
  notes:
    - "set uses dict format: {outputVar: metric}. Array form is not accepted."
    - "Allowed metric values are strictly: count, online, offline, pause, waiting. Anything else is silently dropped."
    - "If, after filtering, 'set' ends up with zero valid metrics, the action fails with HTTP 400 ('bad request')."
    - "queue.id is the lookup key — queue.name is accepted for readability but ignored by the query."
    - "Counts come from enabled skill links only (cc_queue_skill.enabled AND cc_skill_in_agent.enabled); agents attached via disabled skills are not counted."
    - "If the queue has team_id set, only agents whose team matches are counted; if team_id is null, team is ignored."
    - "All values are returned as strings (::varchar) — cast downstream if you need numbers."
    - "The 'waiting' metric depends on the 'channel' argument; omit it only if you don't select 'waiting'."

linkContact:
  available_in: [voice, chat, service]
  visual: false
  description: "Attaches a CRM contact to the current call or chat session. This populates the contact panel in the agent desktop screen-pop."
  args:
    contactId:
      required: true
      type: string
      description: "Contact ID from CRM (supports ${variables})"
  example:
    schema: |
      {"linkContact": {"contactId": "${contacts_list.data.0.id}"}}
  notes:
    - "Usually called after findContact or getContact to link the first match."
    - "If contactId resolves to empty, the call is unlinked (removes previous link)."

addContact:
  available_in: [voice, chat, form, service]
  visual: false
  description: >
    Creates a new contact in the Webitel Contacts service and optionally stores
    the created contact's ID into a session variable. Contact fields live under
    the nested 'input' object (mirrors webitel.contacts.InputContact).
  args:
    token:
      required: true
      type: string
      description: "Webitel API token used to authorize the call."
    setVar:
      type: string
      description: "Name of the session variable to store the created contact's ID in."
    fields:
      type: array
      items: string
      description: "Source fields to return on the created contact (projection mask, e.g. ['id','name','phones'])."
    input:
      required: true
      type: object
      description: "Contact payload — the actual data to create."
      fields:
        name:
          type: object
          description: "Contact name (singleton)."
          fields:
            given:
              type: string
              description: "Given / first name."
            family:
              type: string
              description: "Family / last name."
            middle:
              type: string
              description: "Middle name."
            common_name:
              type: string
              description: "Full display name. If only a single string is available, set it here."
        about:
          type: string
          description: "Short bio / description of the contact. Multi-line text allowed."
        labels:
          type: array
          description: "Labels/tags attached to the contact."
          items:
            type: object
            fields:
              label:
                type: string
                description: "Label value."
        emails:
          type: array
          description: "Email addresses."
          items:
            type: object
            fields:
              email:
                type: string
                required: true
              type:
                type: string
                description: "Usage type (e.g. 'work', 'home')."
              primary:
                type: boolean
        phones:
          type: array
          description: "Phone numbers."
          items:
            type: object
            fields:
              number:
                type: string
                required: true
              type:
                type: string
                description: "Usage type (e.g. 'work', 'mobile', 'home')."
              primary:
                type: boolean
        managers:
          type: array
          description: "Internal Webitel users assigned to own the contact."
          items:
            type: object
            fields:
              user:
                type: object
                fields:
                  id:
                    type: string
              primary:
                type: boolean
        comments:
          type: array
          description: "Initial comment(s) to publish on the new contact."
          items:
            type: object
            fields:
              text:
                type: string
                required: true
        languages:
          type: array
          description: "Locale preferences of the contact."
          items:
            type: object
            fields:
              code:
                type: string
                description: "BCP-47 / ISO code, e.g. 'uk', 'en-US'."
              primary:
                type: boolean
        timezones:
          type: array
          description: "Timezone preferences of the contact."
          items:
            type: object
            fields:
              timezone:
                type: object
                fields:
                  id:
                    type: integer
              primary:
                type: boolean
        imclients:
          type: array
          description: "Instant-messaging identities of the contact."
          items:
            type: object
            fields:
              app:
                type: string
                description: "Client app (e.g. 'telegram', 'viber', 'whatsapp')."
              user:
                type: string
                description: "Username or external IM ID."
        variables:
          type: array
          description: "Custom key/value data attached to the contact."
          items:
            type: object
            fields:
              key:
                type: string
                required: true
              value:
                type: string
                required: true
  examples:
    minimal:
      description: "Create a contact from caller-id and capture its new ID"
      schema: |
        {"addContact": {
          "token": "${CASES_TOKEN}",
          "setVar": "new_contact_id",
          "input": {
            "name":   {"common_name": "${caller_id_name}"},
            "phones": [{"number": "${caller_id_number}", "type": "work", "primary": true}]
          }
        }}
    with_email_and_label:
      description: "Create with email, label and owner manager"
      schema: |
        {"addContact": {
          "token": "${CASES_TOKEN}",
          "setVar": "contact_id",
          "fields": ["id", "name", "phones", "emails"],
          "input": {
            "name":   {"given": "John", "family": "Doe"},
            "emails": [{"email": "john.doe@example.com", "type": "work", "primary": true}],
            "phones": [{"number": "${caller_id_number}", "type": "mobile", "primary": true}],
            "labels": [{"label": "lead"}, {"label": "inbound-ivr"}],
            "managers": [{"user": {"id": "${agent_user_id}"}, "primary": true}]
          }
        }}
    full_profile:
      description: "Create a rich profile with bio, locale, timezone, IM client and custom variables"
      schema: |
        {"addContact": {
          "token": "${CASES_TOKEN}",
          "setVar": "contact_id",
          "input": {
            "name":   {"given": "Марія", "family": "Коваль", "common_name": "Марія Коваль"},
            "about":  "VIP caller, prefers Ukrainian.",
            "phones": [{"number": "${caller_id_number}", "type": "mobile", "primary": true}],
            "emails": [{"email": "maria@example.com", "type": "work"}],
            "languages": [{"code": "uk", "primary": true}],
            "timezones": [{"timezone": {"id": 1}, "primary": true}],
            "imclients": [{"app": "telegram", "user": "@maria"}],
            "variables": [
              {"key": "source",      "value": "ivr"},
              {"key": "segment",     "value": "vip"},
              {"key": "campaign_id", "value": "${campaign_id}"}
            ]
          }
        }}
    with_initial_comment:
      description: "Create and immediately attach an agent note"
      schema: |
        {"addContact": {
          "token": "${CASES_TOKEN}",
          "setVar": "contact_id",
          "input": {
            "name":     {"common_name": "${caller_id_name}"},
            "phones":   [{"number": "${caller_id_number}", "type": "work"}],
            "comments": [{"text": "Created automatically from IVR on ${now}."}]
          }
        }}
    from_crm_enrichment:
      description: "Create using data enriched earlier in the flow (variables prefilled by previous steps)"
      schema: |
        {"addContact": {
          "token": "${CASES_TOKEN}",
          "setVar": "contact_id",
          "fields": ["id"],
          "input": {
            "name":   {"common_name": "${enriched_name}"},
            "phones": [{"number": "${enriched_phone}", "type": "work", "primary": true}],
            "emails": [{"email": "${enriched_email}", "primary": true}],
            "labels": [{"label": "${enriched_segment}"}]
          }
        }}
  notes:
    - "Contact fields are nested under 'input' — they are NOT top-level args (the previous flat form with name/phones/emails at the root is wrong)."
    - "setVar is optional; when provided, the created contact's ID is written into the named session variable."
    - "fields controls which source fields are returned on the response; it does not affect what gets written."
    - "Low-level protobuf/internal fields (x_json_mask, etag, state, sizeCache, unknownFields) are intentionally not documented — do not pass them from flows."



broadcastChatMessage:
  available_in: [voice, chat, form, service]
  visual: true
  description: >
    Sends a chat message through a chat profile to one or more peers (mass
    notifications via Telegram / WhatsApp / Viber / etc.). Supports text, a file
    attachment, inline button rows, custom variables, and reports failed
    receivers back into session variables.
  args:
    profile:
      required: true
      type: object
      description: "Chat profile used to send the message. The profile's type (telegram, whatsapp, ...) is resolved automatically from its id."
      fields:
        id:
          type: integer
          required: true
          description: "Chat profile ID."
    peer:
      required: true
      type: array
      description: >
        Recipients list. Each item may be either a plain string (peer id — its
        type and 'via' are inherited from 'profile'), or an object
        {id, type, via} for explicit cross-profile sends. Must not be empty,
        otherwise the action fails with 'required parameter: peer'.
      items:
        oneOf:
          - type: string
            description: "Peer ID only; type/via are inherited from the chat profile."
          - type: object
            fields:
              id:
                type: string
                required: true
                description: "Peer ID in the target channel (e.g. Telegram chat id)."
              type:
                type: string
                description: "Channel type (e.g. 'telegram', 'whatsapp'). If omitted, the profile's type is used."
              via:
                type: string
                description: "Chat profile ID to send via, as a string. If omitted, 'profile.id' is used."
    text:
      type: string
      description: "Message text. Supports ${variables}. Required unless a file is sent."
    file:
      type: object
      description: "Optional file attachment."
      fields:
        id:
          type: string
          description: "Storage file UUID/id."
        url:
          type: string
          description: "Direct URL to the file (alternative to id)."
    buttons:
      type: array
      description: >
        Inline keyboard as rows of buttons — a 2D array: outer array is rows,
        inner array is buttons in that row. Rendering depends on the chat channel.
      items:
        type: array
        items:
          type: object
          fields:
            text:
              type: string
              required: true
              description: "Button caption."
            type:
              type: string
              description: "Button type (e.g. 'reply', 'url', 'postback') — channel-specific."
            url:
              type: string
              description: "URL to open when the button is a 'url' button."
            code:
              type: string
              description: "Payload / callback data for reply/postback buttons."
    variables:
      type: object
      description: "Extra key-value variables (string → string) passed to the chat manager alongside the broadcast."
    timeout:
      type: integer
      description: >
        How long (in seconds) chat_manager waits for the host callback
        (Telegram / WhatsApp / ...) before treating a peer as failed.
    responseCode:
      type: string
      description: >
        Name of a session variable to store the FIRST failed peer's error code
        into. Legacy single-peer style; use together with or instead of
        'failedReceivers'.
    failedReceivers:
      type: string
      description: >
        Name of a session variable to store the full broadcast result JSON
        (including all failed receivers) into. If not set, the detailed failure
        info is dropped.
  examples:
    minimal_single_peer:
      description: "Send a plain message to one peer via a chat profile"
      schema: |
        {"broadcastChatMessage": {
          "profile": {"id": 12},
          "peer": ["${telegram_chat_id}"],
          "text": "Hello ${caller_id_name}!"
        }}
    mass_notification:
      description: "Broadcast the same text to many peers"
      schema: |
        {"broadcastChatMessage": {
          "profile": {"id": 12},
          "peer": ["123", "456", "789"],
          "text": "System maintenance scheduled for ${maintenance_date}.",
          "timeout": 30,
          "failedReceivers": "mx_failed"
        }}
    cross_channel_peers:
      description: "Send to peers on different channels in a single call"
      schema: |
        {"broadcastChatMessage": {
          "profile": {"id": 12},
          "peer": [
            {"id": "111", "type": "telegram",  "via": "12"},
            {"id": "222", "type": "whatsapp",  "via": "17"},
            {"id": "333", "type": "viber",     "via": "21"}
          ],
          "text": "Your order ${order_id} has shipped."
        }}
    with_file_attachment:
      description: "Send a PDF invoice"
      schema: |
        {"broadcastChatMessage": {
          "profile": {"id": 12},
          "peer": ["${peer_id}"],
          "text": "Your invoice ${invoice_no}",
          "file": {
            "id":   "${file_uuid}",
            "name": "invoice-${invoice_no}.pdf",
            "mime": "application/pdf"
          }
        }}
    inline_buttons:
      description: "Send a message with two rows of inline buttons"
      schema: |
        {"broadcastChatMessage": {
          "profile": {"id": 12},
          "peer": ["${peer_id}"],
          "text": "Confirm your appointment on ${appointment_at}:",
          "buttons": [
            [
              {"text": "Confirm", "type": "reply", "code": "confirm_${appointment_id}"},
              {"text": "Reschedule", "type": "reply", "code": "reschedule_${appointment_id}"}
            ],
            [
              {"text": "Open portal", "type": "url", "url": "https://portal.example.com/appt/${appointment_id}"}
            ]
          ]
        }}
    capture_failures:
      description: "Save both the first error code and the full failure report"
      schema: |
        {"broadcastChatMessage": {
          "profile": {"id": 12},
          "peer": ["${p1}", "${p2}", "${p3}"],
          "text": "Reminder: your payment is due tomorrow.",
          "responseCode":    "broadcast_first_error",
          "failedReceivers": "broadcast_failures_json",
          "timeout": 20
        }}
    with_context_variables:
      description: "Attach custom context variables for the chat manager to consume"
      schema: |
        {"broadcastChatMessage": {
          "profile": {"id": 12},
          "peer": ["${peer_id}"],
          "text": "Welcome, ${contact_name}!",
          "variables": {
            "campaign":  "onboarding_v2",
            "flow_id":   "${flow_id}",
            "locale":    "uk"
          }
        }}
  notes:
    - "The previous shape ({channel, message}) is incorrect — the real fields are profile.id + peer[] + text (plus optional file/buttons/variables/timeout/failedReceivers/responseCode)."
    - "'peer' is required and must be non-empty; the action fails with 'required parameter: peer' otherwise."
    - "Peer items can be strings or objects; string items inherit 'type' and 'via' from the profile."
    - "When 'failedReceivers' is set, the full broadcast result is JSON-encoded into that session variable. When 'responseCode' is set, only the first failed peer's error code is stored."
    - "If chat_manager returns extra variables in its response, they are written to the session automatically (no explicit mapping needed)."
    - "DomainId is injected from the session and must not be passed from flows."

# ─────────────────────────────────────────────────────────────
# CHAT APPS (additional)
# ─────────────────────────────────────────────────────────────


sendTts:
  available_in: [chat]
  visual: true
  description: "Sends a text-to-speech audio message in a chat. Converts text to audio file and sends it to the customer."
  args:
    text:
      required: true
      type: string
      description: "Text to synthesize (supports ${variables})."
    profile:
      type: object
      description: "TTS profile/provider configuration."
    lang:
      type: string
      description: "Language code (e.g. 'uk-UA', 'en-US')."
  example:
    schema: |
      {"sendTts": {"text": "Your order ${order_id} is confirmed.", "lang": "uk-UA"}}

# ─────────────────────────────────────────────────────────────
# FORM/PROCESSING APPS (additional)
# ─────────────────────────────────────────────────────────────

iframe:
  available_in: [form]
  visual: true
  description: "Embeds an external URL in an iframe inside the operator form. Use the form-i-frame component type in formComponent."
  args:
    id:
      required: true
      type: string
      description: "Component ID (referenced in generateForm body)."
    view:
      required: true
      type: object
      fields:
        component: {type: string, const: "form-i-frame"}
        src:
          type: string
          description: "URL to embed (supports ${variables})"
        label:
          type: string
  example:
    schema: |
      {"formComponent": {
        "id": "crm-frame",
        "view": {
          "component": "form-i-frame",
          "src": "https://${WebitelSite}/crm/contacts/${contact_id}",
          "label": "CRM Contact"
        }
      }}
  notes:
    - "Use formComponent with component=form-i-frame, not a standalone iframe app."
    - "Add the component id to generateForm body to display it."

generateLink:
  available_in: [voice, chat, form, service]
  visual: true
  description: >
    Generates a time-limited pre-signed download URL for a file (call recording,
    email attachment, media, etc.) and writes the full URL into a session
    variable. The signature is scoped by domain and carries an 'expires' TTL.
  args:
    set:
      required: true
      type: string
      description: >
        Name of the session variable to store the generated URL in. The action
        fails with 'required parameter: set' if empty.
    server:
      type: string
      description: >
        Base server URL prepended to the generated signed path (e.g.
        'https://media.example.com'). Trailing slash is stripped automatically.
        If empty, only the signed path is stored.
    expire:
      type: integer
      description: >
        Link TTL in seconds. Converted to unix-ms and passed as the 'expires'
        query parameter on the signed URL. After this point the link is no
        longer valid.
    source:
      type: string
      default: media
      description: >
        Resource source to sign against (e.g. 'file', 'media'.). Defaults to 'media' when omitted.
    file:
      type: object
      description: >
        File to link to. When 'file.id' is not provided, the current connection
        id (e.g. call id) is used as the resource id — convenient for linking
        the current call's file/media.
      fields:
        id:
          type: string
          description: "Resource ID to sign. Supports ${variables}."
  examples:
    current_call_recording:
      description: "Signed link to the current call's media, 1 hour TTL"
      schema: |
        {"generateLink": {
          "set":    "recording_url",
          "server": "https://media.example.com",
          "expire": 3600
        }}
    specific_file:
      description: "Signed link to a specific file from 'recordings' source"
      schema: |
        {"generateLink": {
          "set":    "rec_link",
          "server": "https://media.example.com",
          "source": "file",
          "file":   {"id": "${file_id}"},
          "expire": 86400
        }}
    email_attachment:
      description: "Signed link for an email attachment with custom query"
      schema: |
        {"generateLink": {
          "set":    "attach_url",
          "server": "https://media.example.com",
          "source": "file",
          "file":   {"id": "${attachment_id}"},
          "expire": 7200
        }}
    short_lived_preview:
      description: "5-minute preview URL for an agent form"
      schema: |
        {"generateLink": {
          "set":    "preview_url",
          "server": "https://media.example.com",
          "source": "media",
          "file":   {"id": "${media_id}"},
          "expire": 300
        }}
  notes:
    - "'set' is required — the generated URL is written into the session variable whose name is 'set'."
    - "If 'file.id' is omitted, the current connection ID (call id) is used as the resource id; this is the usual way to link the current call's recording."
    - "'server' trailing slash is trimmed; the signed path is appended as-is. Leave 'server' empty to store only the relative signed path."
    - "'expire' is seconds; the action multiplies by 1000 and sets it as the 'expires' query param on the signed URL."
    - "'source' defaults to 'media' when empty."

patchMembers:
  available_in: [voice, chat, form, service]
  visual: true
  description: >
    Bulk-updates outbound dialer members that match a search filter. Commonly
    used in processing forms to reschedule, re-assign a bucket, stop retries,
    update custom variables, or edit communication endpoints on members.
    The request has two parts — 'member' selects what to update, 'patch'
    describes what to change.
  args:
    member:
      required: true
      type: object
      description: "Selector — which members to update. Provide at least one filter."
      fields:
        id:
          type: integer
          description: "Specific member id. If set, updates just that member."
        queues:
          type: array
          description: "List of queues (SearchEntity) whose members to update."
          items:
            type: object
            fields:
              id:
                type: integer
              name:
                type: string
        destination:
          type: string
          description: "Filter by member destination (phone / address)."
        name:
          type: string
          description: "Filter by member name."
        today:
          type: boolean
          description: "Only members scheduled/created for today."
        completed:
          type: boolean
          description: "Filter by completed flag (true = already completed, false = still active)."
        bucket:
          type: object
          description: "Filter by bucket as SearchEntity {id, name}."
          fields:
            id:
              type: integer
            name:
              type: string
    patch:
      required: true
      type: object
      description: "Patch — fields to set on each matching member. Only included fields are applied; others are left untouched."
      fields:
        name:
          type: string
          description: "New display name."
        priority:
          type: integer
          description: "New priority inside the queue (higher = dialed earlier)."
        bucket:
          type: object
          description: "Reassign bucket as SearchEntity {id, name}."
          fields:
            id:
              type: integer
            name:
              type: string
        stopCause:
          type: string
          description: "Stop cause to mark the member with (e.g. 'RECALLED', 'DO_NOT_CALL'). Setting this typically ends further retries."
        queueId:
          type: integer
          description: "Move the member to a different queue by ID."
        variables:
          type: object
          description: "Custom key-value map (string → string) to set/merge onto the member."
        communications:
          type: array
          description: >
            Edit the member's communication endpoints. Items include 'id' to
            update an existing communication, or omit 'id' to add a new one.
          items:
            type: object
            fields:
              id:
                type: integer
                description: "Communication row ID. Provide to update; omit to add."
              destination:
                type: string
                description: "Phone number / address."
              description:
                type: string
                description: "Free-text note."
              type:
                type: object
                description: "Communication type as SearchEntity {id, name} (e.g. phone, mobile)."
                fields:
                  id:
                    type: integer
                  name:
                    type: string
              display:
                type: string
                description: "Caller-ID to present on outbound dials."
              resource:
                type: object
                description: "Outbound resource (gateway/trunk) as SearchEntity {id, name}."
                fields:
                  id:
                    type: integer
                  name:
                    type: string
              priority:
                type: integer
                description: "Per-communication priority."
  examples:
    stop_current_member:
      description: "Mark the current member as recalled / stop retries"
      schema: |
        {"patchMembers": {
          "member": {"id": "${member_id}"},
          "patch":  {"stopCause": "RECALLED"}
        }}
    reschedule:
      description: "Reschedule this member for a later attempt"
      schema: |
        {"patchMembers": {
          "member": {"id": "${member_id}"},
          "patch":  {"readyAt": 1745251200000, "priority": 10}
        }}
    bulk_stop_by_queue:
      description: "Stop all still-active members across a queue (e.g. end of campaign)"
      schema: |
        {"patchMembers": {
          "member": {
            "queues":    [{"id": 42}],
            "completed": false
          },
          "patch": {"stopCause": "CAMPAIGN_CLOSED"}
        }}
    move_to_another_queue:
      description: "Move one member to another queue and put them in a new bucket"
      schema: |
        {"patchMembers": {
          "member": {"id": "${member_id}"},
          "patch": {
            "queueId": 77,
            "bucket":  {"id": 5, "name": "VIP"}
          }
        }}
    update_variables:
      description: "Merge/overwrite custom variables on the member"
      schema: |
        {"patchMembers": {
          "member": {"id": "${member_id}"},
          "patch":  {
            "variables": {
              "agent_note":   "Left voicemail",
              "last_outcome": "no_answer"
            }
          }
        }}
    edit_and_add_communication:
      description: "Update an existing phone and add a new mobile one"
      schema: |
        {"patchMembers": {
          "member": {"id": "${member_id}"},
          "patch": {
            "communications": [
              {
                "id": "${primary_comm_id}",
                "destination": "${new_primary_phone}",
                "display":     "+380443332211",
                "priority":    1
              },
              {
                "destination": "${mobile_phone}",
                "type":        {"id": 2, "name": "mobile"},
                "resource":    {"id": 7},
                "priority":    2,
                "description": "Added from form"
              }
            ]
          }
        }}
    bulk_bucket_reassign:
      description: "Move today's unfinished members of a queue into a new bucket"
      schema: |
        {"patchMembers": {
          "member": {
            "queues":    [{"id": 42}],
            "today":     true,
            "completed": false
          },
          "patch": {"bucket": {"id": 9, "name": "Overflow"}}
        }}
    rename_and_reprioritize:
      description: "Quick name + priority update"
      schema: |
        {"patchMembers": {
          "member": {"id": "${member_id}"},
          "patch":  {"name": "${caller_id_name}", "priority": 50}
        }}
  notes:
    - "The previous shape ({queue, ids, patch}) is incorrect — the real request is {member, patch}. Single-member updates use member.id; bulk updates use member.queues (+ optional destination/name/today/completed/bucket filters)."
    - "Deprecated JSON keys exist for backward compatibility — do NOT use them in new flows: 'bucket_id' (use 'bucket'), 'ready_at' (use 'readyAt'), 'stop_cause' (use 'stopCause'), 'queue_ids' (use 'queues'). The example's 'stop_at' is not a real field."
    - "Only fields present in 'patch' are written; omitted fields keep their current values."
    - "For 'patch.communications': include 'id' to update an existing communication row; omit 'id' to add a new one. Other fields are optional and only provided ones are changed."
    - "'readyAt' is a unix-ms timestamp; pass it as a number or a variable that resolves to one."
    - "'variables' is merged/overwritten key-by-key into the member's existing variables (string → string)."

list:
  available_in: [voice, chat, form, service]
  visual: true
  description: >
    Conditional branch against a named persistent list. Checks whether
    'destination' is present in the target list and, if it is, runs the nested
    'actions' as a forked sub-flow. Typical uses: blocklist guards, VIP routing,
    do-not-call enforcement, region-specific overrides.
  args:
    list:
      required: true
      type: object
      description: "Target list as SearchEntity. Provide 'id' or 'name'."
      fields:
        id:
          type: integer
          description: "List ID."
        name:
          type: string
          description: "List name."
    destination:
      required: true
      type: string
      description: "Value to look up inside the list (usually a phone number). Supports ${variables}."
    actions:
      required: true
      type: array
      description: >
        Array of flow applications to execute if 'destination' is found in the
        list. Executed as a forked sub-flow; if the sub-flow cancels, the
        parent flow is cancelled too.
      items:
        type: object
        description: "Any regular flow application (hangup, goto, setVar, playback, bridge, etc.)."
  examples:
    blocklist_hangup:
      description: "Drop the call immediately if caller is blocklisted"
      schema: |
        {"list": {
          "list":        {"name": "blocklist"},
          "destination": "${caller_id_number}",
          "actions": [
            {"hangup": "CALL_REJECTED"}
          ]
        }}
    vip_priority_route:
      description: "Send VIP callers to the priority queue"
      schema: |
        {"list": {
          "list":        {"id": 17, "name": "vip-callers"},
          "destination": "${caller_id_number}",
          "actions": [
            {"setVar": {"is_vip": "true"}},
            {"goto": "vip_queue_branch"}
          ]
        }}
    dnc_guard:
      description: "Honor Do-Not-Call list in an outbound flow"
      schema: |
        {"list": {
          "list":        {"name": "do-not-call"},
          "destination": "${destination_number}",
          "actions": [
            {"setVar":   {"dnc_hit": "true"}},
            {"playback": {"files": [{"id": "${dnc_announcement_id}"}]}},
            {"hangup":   "NORMAL_CLEARING"}
          ]
        }}
    tag_and_continue:
      description: "Tag the call as known-partner and keep going"
      schema: |
        {"list": {
          "list":        {"id": 9},
          "destination": "${caller_id_number}",
          "actions": [
            {"setVar": {"segment": "partner"}}
          ]
        }}
    region_override:
      description: "If destination is in a regional list, apply a different resource group"
      schema: |
        {"list": {
          "list":        {"name": "eu-destinations"},
          "destination": "${destination_number}",
          "actions": [
            {"setVar": {"resource_group": "eu"}},
            {"goto":   "eu_outbound_branch"}
          ]
        }}
    chat_allowlist:
      description: "Only let whitelisted peers past in a chat flow"
      schema: |
        {"list": {
          "list":        {"name": "chat-allowlist"},
          "destination": "${chat_peer_id}",
          "actions": [
            {"setVar": {"chat_allowed": "true"}}
          ]
        }}
  notes:
    - "The previous shape ({name, action, value, setVar} with action=add|remove|check) is incorrect — 'list' is a conditional branch, not a generic list CRUD. It only reads the list and executes 'actions' on a match."
    - "'actions' is required and must be non-empty; the call fails with 'required parameter: actions' otherwise."
    - "'actions' runs in a forked scope; if that sub-flow cancels, the parent flow is also cancelled."
    - "There is no built-in else branch — if you need one, use the inverse value check or a separate guarded 'list' call."
    - "Top-level 'name' and 'id' still work as a legacy shortcut for list.name / list.id, but they are deprecated — use 'list' in new flows."
    - "Lookup is domain-scoped; list.id / list.name must belong to the current domain."

listAdd:
  available_in: [voice, chat, form, service]
  visual: true
  description: |
    Appends a single entry (destination + optional description + optional
    expiration) to a named Webitel list.
    Different from `list` (which is a conditional branch that reads a list):
    listAdd is a dedicated write action with support for TTL and a free-text
    note. Typical uses: temporary blocklists, callback tracking, rate-limit
    guards, one-off allowlisting.
  args:
    list:
      required: true
      type: object
      description: "Target list as SearchEntity. Provide 'id' or 'name'."
      fields:
        id:
          type: integer
          description: "List ID."
        name:
          type: string
          description: "List name."
    destination:
      required: true
      type: string
      description: >
        Value to append to the list (phone number / address / chat id).
        Supports ${variables}. The action fails with
        'required parameter: destination' if empty.
    description:
      type: string
      description: "Optional free-text note stored alongside the entry (e.g. reason for blocking)."
    expireAt:
      type: integer
      description: >
        Optional expiration as a unix-ms timestamp. When set to a value > 0
        the entry expires at that moment and is no longer matched by 'list'
        checks. Omit or pass 0 for a permanent entry. The session's timezone
        is applied server-side.
  examples:
    add_to_blocklist_permanent:
      description: "Block the current caller indefinitely"
      schema: |
        {"listAdd": {
          "list":        {"name": "blocklist"},
          "destination": "${caller_id_number}",
          "description": "Abusive caller reported via IVR"
        }}
    temporary_block_24h:
      description: "Block the caller for 24 hours"
      schema: |
        {"listAdd": {
          "list":        {"name": "blocklist"},
          "destination": "${caller_id_number}",
          "description": "Auto-block after 5 failed PIN attempts",
          "expireAt":    1748908800000
        }}
    add_vip_by_id:
      description: "Add caller to the VIP list by list id"
      schema: |
        {"listAdd": {
          "list":        {"id": 17},
          "destination": "${caller_id_number}",
          "description": "Self-identified as premium customer"
        }}
    dnc_request:
      description: "Honor a do-not-call request captured in an IVR form"
      schema: |
        {"listAdd": {
          "list":        {"name": "do-not-call"},
          "destination": "${destination_number}",
          "description": "DNC requested via IVR option 9"
        }}
    chat_allowlist_campaign:
      description: "Allow a chat peer for a limited campaign window"
      schema: |
        {"listAdd": {
          "list":        {"name": "chat-allowlist"},
          "destination": "${chat_peer_id}",
          "description": "Campaign ${campaign_id}",
          "expireAt":    1748908800000
        }}
    rate_limit_guard:
      description: "Throttle a destination for 10 minutes after too many calls"
      schema: |
        {"listAdd": {
          "list":        {"name": "rate-limit"},
          "destination": "${caller_id_number}",
          "description": "Exceeded 5 calls/min",
          "expireAt":    "${now_ms_plus_10m}"
        }}
    from_form_input:
      description: "Agent adds a number to a custom list during call processing"
      schema: |
        {"listAdd": {
          "list":        {"id": "${selected_list_id}"},
          "destination": "${form_number}",
          "description": "${form_comment}"
        }}
  notes:
    - "There is no 'isExpire' flag — expiration is controlled solely by 'expireAt'. If 'expireAt' is set and > 0 the entry expires at that moment, otherwise it is permanent. Any prior docs mentioning 'isExpire' are outdated."
    - "'destination' is required and must be non-empty; the action fails with 'required parameter: destination' otherwise."
    - "'list' must be a SearchEntity ({id} or {name}); lookup is domain-scoped to the current session."
    - "'expireAt' is unix-ms (not seconds); the session's timezone is applied server-side."
    - "This action only appends. Use the 'list' action to branch on list membership. There is no built-in remove exposed here, and no duplicate-check — the same destination added twice will produce two entries."

chatHistory:
  available_in: [chat]
  visual: true
  description: |
    Retrieves the conversation history for the current chat session and stores it
    in a variable. Useful for passing context to AI apps (chatAi, openai, gemini)
    or for logging/analysis.
  args:
    conversationId:
      type: string
      description: "Chat conversation ID. Defaults to current session if empty (leave blank)."
    variable:
      required: true
      type: string
      description: "Variable name to store the retrieved history."
    format:
      type: string
      values: [html, txt]
      default: html
      description: "Output format: html (with tags) or txt (plain text)."
    timeout:
      type: integer
      default: 3000
      description: "Request timeout in milliseconds."
    limit:
      type: integer
      default: 300
      description: "Maximum number of messages to retrieve."
  example:
    schema: |
      {"chatHistory": {
        "conversationId": "",
        "variable": "chat_log",
        "format": "txt",
        "timeout": 3000,
        "limit": 100
      }}
  notes:
    - "Leave conversationId empty to use the current active chat session."
    - "Pass chat_log to chatAi or openai to give the AI full conversation context."

customCode:
  available_in: [voice, service]
  visual: true
  description: |
    Embeds arbitrary schema JSON directly into the execution flow.
    The `code` field is a JSON string that is parsed and merged into the schema at runtime.
    Use this for one-off apps not natively supported in the visual editor, or for
    complex nested structures that other nodes don't support.
    In the visual editor, this node appears with label "customCode" and shows a JSON editor.
  args:
    code:
      required: true
      type: string
      description: "JSON string containing the schema block to inject. Must be valid JSON."
  example:
    schema: |
      {"customCode": {
        "code": "{\"lastBridged\": {\"number\": \"${caller_id_number}\", \"hours\": 24, \"calls\": {\"inbound\": \"all\", \"outbound\": \"all\"}, \"set\": {\"my_ext\": \"extension\"}}}"
      }}
  notes:
    - "For most cases prefer named apps (lastBridged, userInfo, etc.) over customCode."
    - "Use customCode only when no named app covers the needed functionality."
    - "The code value must be a valid JSON string (escape inner quotes)."

setGrantee:
  available_in: [voice]
  visual: true
  description: |
    Assigns a Webitel user as the grantee (owner) of the current call.
    Used for call ownership, routing rules, and access control in supervisor views.
  args:
    id:
      required: true
      type: string
      description: "Webitel user ID (supports ${variables})"

  example:
    schema: |
      {"setGrantee": {
        "id": "${contacts_list.data.0.managers.data.0.user.id}"
      }}

openLink:
  available_in: [form]
  visual: true
  description: |
    Opens a URL in the agent's browser tab from within a processing form.
    Use this to launch CRM pages, external systems, or any URL based on call data.
    This is a processing form action — it triggers on form submission, not as a widget.
  args:
    url:
      required: true
      type: string
      description: "URL to open (supports ${variables})."
    userId:
      type: string
      default: "${user_id}"
      description: "Webitel user ID of the agent (auto-populated from system var)."
  example:
    schema: |
      {"openLink": {
        "url": "https://${WebitelSite}/crm/contacts/${contact_id}",
        "userId": "${user_id}"
      }}
  notes:
    - "openLink is triggered as part of form processing, not rendered as a form widget."
    - "Combine with linkContact/findContact to open the matched contact's CRM page."

# ─── Queue / Call-Center metrics ─────────────────────────────
ewt:
  available_in: [voice, chat]
  visual: false
  description: >
    Estimates Expected Wait Time (EWT) for the current call and stores the
    result (seconds, float formatted as string) into a session variable.
    The calculation is position × average-wait-time from recent completed
    attempts on the given queues/buckets. If the current call has already
    left a queue, that queue is used and the original position is recovered;
    otherwise the call is assumed to be appended at the tail across the
    provided queues/buckets (position = waiting_count + 1). AWT is averaged
    from the last 2 completed attempts within the 'min' window.
  args:
    setVar:
      required: true
      type: string
      description: >
        Name of the session variable to store the EWT value in. The value is
        written as a string-formatted float representing seconds. The action
        fails with 'required parameter: setVar' if empty.
    queue_ids:
      type: array
      items: integer
      description: >
        Queue IDs to scope the EWT calculation on (both for position counting
        and for AWT averaging). Required unless the current call has already
        left a queue (in which case that queue is used automatically).
    bucket_ids:
      type: array
      items: integer
      description: >
        Bucket IDs to further scope the calculation. When provided, only
        attempts whose bucket_id is in this list are counted. When omitted,
        only attempts with bucket_id IS NULL are considered.
    min:
      type: integer
      default: 60
      description: >
        Look-back window in MINUTES for sampling completed attempts (used to
        compute AWT). The SQL uses this as an INTERVAL in minutes — the
        previous docs incorrectly described it as seconds. If 0 or omitted,
        defaults to 60 minutes.
  examples:
    current_queue:
      description: "EWT for the current call on queue 42"
      schema: |
        {"ewt": {
          "setVar":    "expected_wait",
          "queue_ids": [42]
        }}
    multi_queue:
      description: "EWT across several queues"
      schema: |
        {"ewt": {
          "setVar":    "expected_wait",
          "queue_ids": [42, 43, 44]
        }}
    with_buckets:
      description: "Scope by buckets (e.g. VIP vs Standard)"
      schema: |
        {"ewt": {
          "setVar":     "expected_wait",
          "queue_ids":  [42],
          "bucket_ids": [1, 2]
        }}
    wider_history_window:
      description: "Use a 4-hour look-back window for AWT"
      schema: |
        {"ewt": {
          "setVar":    "expected_wait",
          "queue_ids": [42],
          "min":       240
        }}
    quick_window:
      description: "Use only the last 15 minutes of completed attempts"
      schema: |
        {"ewt": {
          "setVar":    "expected_wait",
          "queue_ids": [42],
          "min":       15
        }}
    announce_to_caller:
      description: "Compute EWT, then play it back to the caller"
      schema: |
        [
          {"ewt": {"setVar": "expected_wait", "queue_ids": [42]}},
          {"playback": {"files": [{"id": "${you_will_wait_approx_file_id}"}]}},
          {"say": {"text": "${expected_wait}", "type": "number"}}
        ]
    overflow_gate:
      description: "Use EWT to decide between queues"
      schema: |
        [
          {"ewt": {"setVar": "primary_ewt", "queue_ids": [42]}},
          {"if": {
            "expression": "${primary_ewt} > 180",
            "then": [{"joinQueue": {"queue": {"id": 77}}}],
            "else": [{"joinQueue": {"queue": {"id": 42}}}]
          }}
        ]
  notes:
    - "'min' is MINUTES, not seconds — the underlying SQL converts it via `:Min || ' min'::interval`. Default is 60 minutes."
    - "The result is a float (in seconds) formatted via fmt.Sprintf(\"%f\", ewt) — cast/parseFloat downstream if you need numeric arithmetic in JS expressions."
    - "bucket_ids semantics: set → filter attempts with bucket_id IN (list); unset → filter attempts with bucket_id IS NULL. There is no 'any bucket' mode."
    - "If the current call has already left a queue (cc_member_attempt.leaving_at IS NOT NULL), its original queue and position are used, and queue_ids is effectively ignored for position counting."
    - "If the current call is not (yet) in any attempt, position is (count of still-waiting attempts on queue_ids/bucket_ids) + 1."
    - "AWT is averaged over the last 2 completed, bridged, agent-assigned attempts inside the 'min' window — a small sample by design; short windows with no completions will yield 0."
    - "'strategy' is accepted but currently unused in this handler."

ccPosition:
  available_in: [voice]
  visual: false
  args:
    set:
      required: true
      type: string
      description: Variable to store the queue position (integer).
  example:
    schema: |
      {"ccPosition": {"set": "my_position"}}

getQueueInfo:
  available_in: [voice, chat, service]
  visual: false
  args:
    queue:
      required: true
      type: object
      description: Queue reference — {id, name}.
    set:
      required: true
      type: object
      description: >
        Map of output_variable → queue_field. E.g. {"wait_time": "max_wait_time"}.
  example:
    schema: |
      {"getQueueInfo": {
        "queue": {"id": 7, "name": "Support"},
        "set": {"q_strategy": "strategy", "q_max_wait": "max_wait_time"}
      }}

getQueueMetrics:
  available_in: [voice, chat, service]
