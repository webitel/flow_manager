        "metric": "sl",
        "slSec": 20,
        "lastMinutes": 60
      }}

joinAgentToTask:
  available_in: [chat, service]
  visual: false
  args:
    agent:
      required: true
      type: object
      description: "Agent reference — {id} or {extension}."
    communication:
      type: object
      description: "Destination communication details — {destination, type: {id, name}}."
    processing:
      type: object
