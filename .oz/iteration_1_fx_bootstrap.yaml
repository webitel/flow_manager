version: 1
iteration_id: fx-bootstrap-01
objective: Introduce fx bootstrap layer while preserving existing behavior.
scope:
  include:
    - cmd/flow-manager/main.go
    - internal/bootstrap/fx/
    - internal/bootstrap/config/
  exclude:
    - flow runtime behavior
    - routing decision logic
    - provider protocol internals
tasks:
  - id: I1-T1
    title: Add new cmd entrypoint
    details:
      - Create cmd/flow-manager/main.go.
      - Delegate to current startup path.
      - Keep server.go temporarily as compatibility shim.
  - id: I1-T2
    title: Create fx app skeleton
    details:
      - Add internal/bootstrap/fx/app.go with fx.New(...) root.
      - Add module files for config/logger/store/mq/providers/routers.
      - Use constructors that wrap existing concrete implementations.
  - id: I1-T3
    title: Move start/stop wiring to fx lifecycle
    details:
      - Register OnStart hooks for servers and listeners.
      - Register OnStop hooks for graceful shutdown.
      - Keep existing order from app/server.go and app/listener.go.
  - id: I1-T4
    title: Add smoke validation
    details:
      - Ensure app boots and stops cleanly.
      - Verify one inbound flow path (grpc/chat) still executes.
      - Verify no regression in disconnected trigger execution.
acceptance:
  - Existing flows execute without schema behavior changes.
  - Service startup/shutdown sequence remains stable.
  - Build and tests pass for touched packages.
verify:
  commands:
    - go test ./...
rollback:
  - Keep old startup path accessible until fx path is stable.
