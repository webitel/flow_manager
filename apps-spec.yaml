# ─── Integration ─────────────────────────────────────────────

sql:
  available_in: [voice, chat, form, service]
  visual: false
  args:
    driver:
      required: true
      type: string
      description: Database driver name (e.g. "postgres").
    dns:
      required: true
      type: string
      description: Connection string / DSN for the database.
    query:
      required: true
      type: string
      description: SQL query to execute. Use params[] for parameterized queries.
    params:
      type: array
      description: Parameter values to bind to the query ($1, $2 …).
    timeout:
      type: integer
      default: 1000
      description: Query timeout in milliseconds.
  notes:
    - "Result columns are returned as session variables using column names as keys."
    - "Use params[] to prevent SQL injection — never interpolate ${vars} directly into query."
  example:
    schema: |
      {"sql": {
        "driver": "postgres",
        "dns": "postgres://user:pass@db-host/mydb",
        "query": "SELECT status FROM orders WHERE order_id = $1",
        "params": ["${order_id}"],
        "timeout": 3000
      }}

mq:
  available_in: [voice, chat, service]
  visual: false
  args:
    exchange:
      required: true
      type: string
      description: RabbitMQ exchange name.
    topic:
      required: true
      type: string
      description: Routing key / topic.
    body:
      type: object
      description: Message payload (any JSON-serializable value; supports ${variables}).
    setErr:
      type: string
      description: Variable to store error message if publish fails.
  example:
    schema: |
      {"mq": {
        "exchange": "webitel.events",
        "topic": "call.completed",
        "body": {
          "call_id": "${uuid}",
          "caller": "${caller_id_number}",
          "duration": "${duration}"
        },
        "setErr": "mq_error"
      }}

topicExtraction:
  available_in: [voice, chat, service]
  visual: false
  args:
    connection:
      required: true
      type: string
      description: URL of the topic extraction API endpoint.
    possibleTopics:
      required: true
      type: array
      description: List of candidate topic strings to match against.
    limit:
      type: integer
      default: 4
      description: Number of recent messages to send to the API.
    messages:
      type: array
      description: >
        Manual message list [{sender, message}]. Used in service flows where
        call/chat context is not available.
    definedTopic:
      type: string
      description: Variable to store the matched topic string.
    score:
      type: string
      description: Variable to store the confidence float (0.0–1.0).
  notes:
    - "In voice flows: automatically pulls recent STT transcription segments."
    - "In chat flows: automatically pulls last N chat messages."
    - "In service flows: provide messages[] manually."
  example:
    schema: |
      {"topicExtraction": {
        "connection": "https://ai.internal/topic",
        "possibleTopics": ["billing", "technical_support", "sales", "general"],
        "limit": 5,
        "definedTopic": "call_topic",
        "score": "topic_confidence"
      }}

# ─── Session / Flow control ──────────────────────────────────

timezone:
  available_in: [voice, chat, form, service]
  visual: false
  args:
    name:
      type: string
      description: IANA timezone name (e.g. "Europe/Kyiv", "America/New_York").
    id:
      type: integer
      description: Webitel timezone ID (alternative to name).
  notes:
    - "Use either id or name — not both."
    - "Default timezone is the domain's configured timezone."
  example:
    schema: |
      {"timezone": {"name": "Europe/Kyiv"}}

global:
  available_in: [voice, chat, form, service]
  visual: false
  args:
    type: object
  notes:
    - "Each key maps to a GlobalVar with value (string) and optional encrypt (bool)."
    - "Encrypted values are stored encrypted and never exposed in logs."
    - "Unlike set, global variables are shared across all sessions in the domain."
  example:
    schema: |
      {"global": {
        "maintenance_mode": {"value": "true", "encrypt": false},
        "api_secret": {"value": "${secret_value}", "encrypt": true}
      }}

dump:
  available_in: [voice, chat, form, service]
  visual: false
  args:
    type: object
  notes:
    - "No args required. Output goes to server logs, not to the caller."
    - "Equivalent to a print-all-vars breakpoint."
  example:
    schema: |
      {"dump": {}}

# ─── Meeting ─────────────────────────────────────────────────

createMeeting:
  available_in: [voice, chat, form, service]
  visual: false
  args:
    setVar:
      required: true
