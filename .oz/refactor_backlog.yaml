version: 1
tracks:
  - id: flow-engine-safety
    priority: high
    goals:
      - Clarify cancellation and limiter semantics.
      - Reduce shared mutable state risk in Flow/Node traversal.
    first_targets:
      - flow/flow.go
      - flow/handler.go
      - flow/while.go
    guardrails:
      - Keep existing schema behavior backward compatible.
      - Add regression tests for goto, while, and trigger combinations.
  - id: router-unification
    priority: high
    goals:
      - Reduce duplicated Request/AddApplications/Handle boilerplate across routes.
      - Centralize common router behavior.
    first_targets:
      - routes/call/router.go
      - routes/chat/router.go
      - routes/email/router.go
      - routes/grpc/router.go
      - routes/processing/router.go
      - routes/channel/router.go
      - routes/webhook/hook.go
      - routes/im/router.go
    guardrails:
      - No behavior changes for routing resolution logic.
  - id: observability-and-errors
    priority: medium
    goals:
      - Standardize app error codes and log fields.
      - Ensure consistent step log naming and persistence.
    first_targets:
      - flow/handler.go
      - flow/flow.go
      - routes/call/router.go
      - app/listener.go
  - id: provider-boundaries
    priority: medium
    goals:
      - Isolate provider-specific concerns from core flow execution.
      - Make connection lifecycle more explicit and testable.
    first_targets:
      - providers/fs/server.go
      - providers/grpc/server.go
      - providers/email/server.go
      - providers/im/server.go
      - providers/http/server.go
definition_of_done:
  - Tests pass for touched modules.
  - No regression in call, chat, and email routing paths.
  - Flow triggers and export variables are preserved.
next_session_default:
  focus: router-unification
  suggested_first_step: Extract a shared base router helper for Request and AddApplications.
  verification_hint:
    - go test ./...
