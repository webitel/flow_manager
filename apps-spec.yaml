      }}

# ─── Feedback ────────────────────────────────────────────────

feedback:
  available_in: [voice, chat, form, service]
  visual: false
  args:
    setVar:
      required: true
      type: string
      description: Variable to store the generated feedback token.
    source:
      type: string
      default: email
