name: PR (webitel-flow-manager)
run-name: "webitel-flow-manager@pr${{ github.event.pull_request.number }}#${{ github.run_number }} - ${{ github.event.pull_request.title }}"

on:
  pull_request:

permissions: { contents: read }
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare
    uses: webitel/reusable-workflows/.github/workflows/golang-prepare.yml@v2
    permissions:
      contents: read
      pull-requests: read
      id-token: write

    with:
      development-branch: ${{ github.event.repository.default_branch }}
      triggered-branch: ${{ github.event.pull_request.base.ref }}

  checks:
    name: Checks
    needs: [ prepare ]
    uses: webitel/reusable-workflows/.github/workflows/golang-checks.yml@v2
    permissions:
      contents: read
      actions: read
      security-events: write

    with:
      changes: ${{ needs.prepare.outputs.changes }}

  compile:
    name: Build
    needs: [ prepare ]
    uses: webitel/reusable-workflows/.github/workflows/golang-build.yml@v2
    with:
      binary-name: webitel-flow-manager
      ldflags: >
        -s -w
        -X github.com/webitel/flow_manager/model.BuildNumber=${{ github.run_number }}
        

      version: ${{ needs.prepare.outputs.version }}
      version-build: ${{ github.run_number }}
      prerelease: dev~pr${{ github.event.pull_request.number }}
      package-name: webitel-flow-manager
      package-description: ${{ github.event.repository.description }}
      package-contents: |
        src=deploy/systemd/webitel-flow-manager.service dst=/etc/systemd/system/webitel-flow-manager.service type=config
        src=.env.example dst=/etc/default/webitel-flow-manager type=config
        

      scripts: |
        postinstall: deploy/debian/postinst.sh
        preremove: deploy/debian/prerm.sh
        postremove: deploy/debian/postrm.sh
        
